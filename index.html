<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PaperTrade Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#f5f5f7;
  --surface:#ffffff;
  --surface2:#f0f0f2;
  --border:#e2e2e8;
  --text:#0a0a0f;
  --text2:#6b6b7a;
  --text3:#a0a0b0;
  --green:#00c878;
  --green-bg:#e6faf3;
  --green-dark:#00a060;
  --red:#ff3b5c;
  --red-bg:#fff0f3;
  --red-dark:#cc1a3a;
  --accent:#1a1aff;
  --accent-soft:#ebebff;
  --gold:#f5a623;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --radius:14px;
  --radius-sm:8px;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  max-width:480px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  height:100vh;
}
button{cursor:pointer;border:none;font-family:inherit;outline:none}
input{font-family:inherit;outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── HEADER ── */
#header{
background:var(–surface);
border-bottom:1px solid var(–border);
padding:12px 16px 10px;
display:flex;justify-content:space-between;align-items:center;
flex-shrink:0;z-index:20;
box-shadow:var(–shadow);
}
#logo{
font-family:‘JetBrains Mono’,monospace;
font-weight:800;font-size:16px;
color:var(–text);
display:flex;align-items:center;gap:8px;
letter-spacing:-0.5px;
}
#logo .dot{width:8px;height:8px;border-radius:50%;background:var(–green);box-shadow:0 0 8px var(–green);}
#hRight{text-align:right}
#hTotal{
font-family:‘JetBrains Mono’,monospace;
font-weight:800;font-size:18px;color:var(–text);
letter-spacing:-0.5px;
}
#hPnl{font-size:11px;font-weight:700;font-family:‘JetBrains Mono’,monospace}
#hLabel{font-size:9px;color:var(–text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}

/* ── STATUS BAR ── */
#modebar{
padding:5px 16px;font-size:10px;
display:flex;align-items:center;gap:6px;
flex-shrink:0;transition:all .5s;
font-family:‘JetBrains Mono’,monospace;
font-weight:500;
}
#modedot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── TICKER STRIP ── */
#tickerStrip{
display:flex;overflow-x:auto;
background:var(–surface);
border-bottom:1px solid var(–border);
flex-shrink:0;
-webkit-overflow-scrolling:touch;
padding:0 4px;
}
.ti{
flex-shrink:0;padding:8px 10px;cursor:pointer;
border-bottom:2px solid transparent;
min-width:66px;text-align:center;
transition:all .15s;
}
.ti.sel{background:var(–accent-soft);border-bottom-color:var(–accent)}
.ti-sym{font-size:11px;font-weight:800;color:var(–text2);font-family:‘DM Sans’,sans-serif}
.ti.sel .ti-sym{color:var(–accent)}
.ti-p{font-size:9px;color:var(–text3);margin:1px 0;font-family:‘JetBrains Mono’,monospace}
.ti-c{font-size:9px;font-weight:700;font-family:‘JetBrains Mono’,monospace}

/* ── BOTTOM NAV ── */
#bottomNav{
position:fixed;bottom:0;left:50%;transform:translateX(-50%);
width:100%;max-width:480px;
background:var(–surface);
border-top:1px solid var(–border);
display:flex;
z-index:30;
box-shadow:0 -4px 20px rgba(0,0,0,0.08);
padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav{
flex:1;padding:10px 4px 8px;
display:flex;flex-direction:column;align-items:center;gap:3px;
font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
color:var(–text3);background:transparent;
transition:all .15s;border-top:2px solid transparent;
}
.bnav.on{color:var(–accent);border-top-color:var(–accent)}
.bnav svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}

/* ── CONTENT ── */
#content{
flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:14px 14px 96px;
}

/* ── CHART PAGE ── */
.asset-header{
display:flex;justify-content:space-between;align-items:flex-start;
margin-bottom:12px;
}
.asset-left .asset-name{font-size:11px;color:var(–text3);font-weight:600;margin-bottom:4px;letter-spacing:.3px}
.asset-left .asset-price{
font-family:‘JetBrains Mono’,monospace;
font-size:32px;font-weight:800;color:var(–text);
letter-spacing:-1px;line-height:1;
}
.asset-right{text-align:right}
.asset-chg{font-size:17px;font-weight:800;font-family:‘JetBrains Mono’,monospace}
.asset-pct{font-size:12px;font-weight:700;font-family:‘JetBrains Mono’,monospace}
.asset-label{font-size:9px;color:var(–text3);margin-top:3px}

/* ── CHART WRAP ── */
.chart-wrap{
background:var(–surface);
border-radius:var(–radius);
border:1px solid var(–border);
padding:12px 8px 8px;
margin-bottom:10px;
box-shadow:var(–shadow);
position:relative;
overflow:hidden;
}
#cvs{width:100%;height:230px;display:block}
.tf-row{display:flex;gap:5px;margin-top:8px;align-items:center}
.tfb{
padding:5px 13px;font-size:11px;font-weight:700;
border-radius:20px;background:var(–surface2);color:var(–text3);
transition:all .15s;border:1px solid var(–border);
font-family:‘DM Sans’,sans-serif;
}
.tfb.on{background:var(–text);color:var(–surface);border-color:var(–text)}
.vol-label{margin-left:auto;font-size:10px;color:var(–text3);font-family:‘JetBrains Mono’,monospace}

/* ── OHLC ── */
.ohlc{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.oc{
background:var(–surface);border-radius:var(–radius-sm);
padding:8px 6px;text-align:center;
border:1px solid var(–border);
}
.ol{font-size:8px;color:var(–text3);text-transform:uppercase;margin-bottom:3px;font-weight:700;letter-spacing:.8px}
.ov{font-size:12px;font-weight:800;font-family:‘JetBrains Mono’,monospace;color:var(–text)}

/* ── ORDER PANEL ── */
.opanel{
background:var(–surface);border-radius:var(–radius);
padding:16px;border:1px solid var(–border);
box-shadow:var(–shadow);
}
.panel-label{font-size:10px;color:var(–text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.side-toggle{
display:flex;border-radius:10px;overflow:hidden;
margin-bottom:14px;background:var(–surface2);padding:3px;gap:3px;
}
.stb{
flex:1;padding:10px;font-weight:800;font-size:13px;
background:transparent;color:var(–text3);
border-radius:8px;transition:all .2s;
letter-spacing:.3px;
}
.stb.buy.on{background:var(–green);color:#fff;box-shadow:0 2px 12px rgba(0,200,120,.3)}
.stb.sell.on{background:var(–red);color:#fff;box-shadow:0 2px 12px rgba(255,59,92,.3)}
.qty-input{
width:100%;padding:13px 14px;
background:var(–surface2);border:1.5px solid var(–border);
border-radius:10px;color:var(–text);font-size:16px;font-weight:700;
margin-bottom:12px;font-family:‘JetBrains Mono’,monospace;
transition:border-color .15s;
}
.qty-input:focus{border-color:var(–accent)}
.qty-shortcuts{display:flex;gap:5px;margin-bottom:12px}
.qs{
flex:1;padding:6px 4px;font-size:10px;font-weight:700;
background:var(–surface2);border:1px solid var(–border);
border-radius:6px;color:var(–text2);transition:all .15s;
}
.qs:active{background:var(–accent-soft);color:var(–accent);border-color:var(–accent)}
.info-row{display:flex;justify-content:space-between;font-size:12px;color:var(–text3);margin-bottom:7px}
.info-val{color:var(–text);font-weight:700;font-family:‘JetBrains Mono’,monospace}
.trade-btn{
width:100%;padding:16px;font-size:15px;font-weight:900;
border-radius:12px;color:#fff;margin-top:8px;
letter-spacing:.3px;transition:all .15s;
font-family:‘DM Sans’,sans-serif;
}
.trade-btn:active{transform:scale(.98);opacity:.9}
.trade-btn.buy-btn{background:linear-gradient(135deg,#00c878,#00a060);box-shadow:0 4px 20px rgba(0,200,120,.25)}
.trade-btn.sell-btn{background:linear-gradient(135deg,#ff3b5c,#cc1a3a);box-shadow:0 4px 20px rgba(255,59,92,.25)}

/* ── PORTFOLIO ── */
.section-label{
font-size:10px;color:var(–text3);font-weight:700;
letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;
display:flex;align-items:center;gap:6px;
}
.account-card{
background:var(–surface);border-radius:var(–radius);
border:1px solid var(–border);padding:16px;
margin-bottom:14px;box-shadow:var(–shadow);
}
.acc-row{
display:flex;justify-content:space-between;
padding:7px 0;border-bottom:1px solid var(–border);
font-size:13px;
}
.acc-row:last-of-type{border-bottom:none}
.acc-row.total{font-weight:900;font-size:15px}
.acc-key{color:var(–text3)}
.acc-val{font-weight:700;font-family:‘JetBrains Mono’,monospace;color:var(–text)}
.pnl-badge{
margin-top:12px;padding:12px;border-radius:10px;
text-align:center;font-weight:900;font-size:16px;
font-family:‘JetBrains Mono’,monospace;letter-spacing:-0.3px;
}
.pos-card{
background:var(–surface);border-radius:var(–radius);
padding:14px;margin-bottom:10px;
border:1px solid var(–border);cursor:pointer;
transition:all .15s;box-shadow:var(–shadow);
position:relative;overflow:hidden;
}
.pos-card::before{
content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;
border-radius:0 3px 3px 0;
}
.pos-card.pos-up::before{background:var(–green)}
.pos-card.pos-dn::before{background:var(–red)}
.pos-card:active{background:var(–surface2)}
.pos-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pos-sym{font-weight:900;font-size:18px;color:var(–text)}
.pos-shares{font-size:11px;color:var(–text3);font-weight:600;margin-top:2px}
.pos-val{font-weight:800;font-size:15px;text-align:right;font-family:‘JetBrains Mono’,monospace}
.pos-pnl{font-size:12px;font-weight:700;text-align:right;font-family:‘JetBrains Mono’,monospace}
.pos-detail{font-size:11px;color:var(–text3)}

/* ── PORTFOLIO CHART ── */
.port-chart-wrap{
background:var(–surface);border-radius:var(–radius);
border:1px solid var(–border);padding:12px;
margin-bottom:14px;box-shadow:var(–shadow);
}
#portChart{width:100%;height:120px;display:block}

/* ── HISTORY ── */
.stats-grid{
display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;
}
.stat-box{
background:var(–surface);border-radius:var(–radius-sm);
padding:12px 8px;text-align:center;
border:1px solid var(–border);box-shadow:var(–shadow);
}
.stat-label{font-size:9px;color:var(–text3);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-weight:800;font-size:17px;font-family:‘JetBrains Mono’,monospace;color:var(–text)}
.tx-item{
background:var(–surface);border-radius:var(–radius-sm);
padding:12px;margin-bottom:7px;
border:1px solid var(–border);
display:flex;justify-content:space-between;align-items:center;
cursor:pointer;transition:all .15s;
}
.tx-item:active{background:var(–surface2)}
.tx-sym{font-weight:900;font-size:16px;color:var(–text)}
.tx-time{font-size:10px;color:var(–text3);margin-top:2px}
.tx-badge{
padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;
letter-spacing:.5px;text-transform:uppercase;
}
.tx-badge.buy{background:var(–green-bg);color:var(–green-dark)}
.tx-badge.sell{background:var(–red-bg);color:var(–red-dark)}
.tx-shares{font-size:10px;color:var(–text3);margin-top:3px;text-align:center}
.tx-amt{font-weight:800;font-size:14px;font-family:‘JetBrains Mono’,monospace;text-align:right}
.tx-price{font-size:10px;color:var(–text3);text-align:right;margin-top:2px}

/* ── UTILS ── */
.g{color:var(–green-dark)}.r{color:var(–red-dark)}
.empty{
text-align:center;color:var(–text3);padding:60px 20px;font-size:13px;line-height:2;
}
.empty-icon{font-size:40px;margin-bottom:12px}
.chip{
display:inline-flex;align-items:center;gap:4px;
padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;
letter-spacing:.5px;text-transform:uppercase;
}
.chip.live{background:var(–green-bg);color:var(–green-dark)}
.chip.sim{background:#fff8e6;color:#c47a00}

/* ── TOAST ── */
#toast{
position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
background:var(–text);color:var(–surface);
padding:12px 20px;border-radius:100px;
font-size:13px;font-weight:700;
z-index:999;opacity:0;transition:all .3s;pointer-events:none;
white-space:nowrap;box-shadow:var(–shadow-lg);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESET BTN ── */
#resetBtn{
position:fixed;top:16px;left:16px;
background:var(–surface2);border:1px solid var(–border);
padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;
color:var(–text3);z-index:99;display:none;
}
</style>

</head>
<body>

<div id="header">
  <div id="logo">
    <div class="dot"></div>
    PaperTrade Pro
  </div>
  <div id="hRight">
    <div id="hLabel">Portfolio Value</div>
    <div id="hTotal">$25,000.00</div>
    <div id="hPnl" class="g">+$0.00 (0.00%)</div>
  </div>
</div>

<div id="modebar" style="background:#f0faf5;color:#00a060">
  <span id="modedot" style="background:#00c878"></span>
  <span id="modetext">Connecting to market data...</span>
</div>

<div id="tickerStrip"></div>

<!-- CONTENT -->

<div id="content"></div>

<!-- BOTTOM NAV -->

<nav id="bottomNav">
  <button class="bnav on" onclick="showTab('chart')" id="nav-chart">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Chart
  </button>
  <button class="bnav" onclick="showTab('port')" id="nav-port">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    Portfolio
  </button>
  <button class="bnav" onclick="showTab('hist')" id="nav-hist">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    History
  </button>
  <button class="bnav" onclick="showTab('stats')" id="nav-stats">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </button>
</nav>

<div id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const SB = 25000;
const STOCKS = [
  {sym:"AAPL",  name:"Apple Inc.",       seed:227.50, vol:0.018},
  {sym:"TSLA",  name:"Tesla Inc.",       seed:248.00, vol:0.038},
  {sym:"NVDA",  name:"NVIDIA Corp.",     seed:875.00, vol:0.035},
  {sym:"MSFT",  name:"Microsoft Corp.",  seed:415.00, vol:0.016},
  {sym:"AMZN",  name:"Amazon.com",       seed:195.00, vol:0.022},
  {sym:"META",  name:"Meta Platforms",   seed:510.00, vol:0.025},
  {sym:"GOOGL", name:"Alphabet Inc.",    seed:175.00, vol:0.019},
  {sym:"JPM",   name:"JPMorgan Chase",   seed:198.00, vol:0.014},
  {sym:"SPY",   name:"S&P 500 ETF",      seed:512.00, vol:0.010},
  {sym:"GME",   name:"GameStop Corp.",   seed:18.50,  vol:0.065},
];

// ─── STATE ───────────────────────────────────────────────
let bal = SB, port = {}, txs = [], sel = "AAPL";
let curTab = "chart", side = "buy", tf = "1D";
let stockData = {}, portHistory = [SB];
let liveMode = false;
let lastDrawHash = "";

// ─── GBM ─────────────────────────────────────────────────
function gbm(p, v) {
  const z = (Math.random()+Math.random()+Math.random()) - 1.5;
  return +Math.max(0.01, p * Math.exp(0.00003 + v * z * 0.004)).toFixed(2);
}
function genHistory(seed, vol, n=250) {
  let p = seed*(0.90+Math.random()*0.20), cs=[];
  const now = Date.now();
  for (let i=n;i>=0;i--) {
    const o=p; p=gbm(p,vol);
    const hi=+(Math.max(o,p)*(1+Math.random()*vol*0.5)).toFixed(2);
    const lo=+(Math.min(o,p)*(1-Math.random()*vol*0.5)).toFixed(2);
    cs.push({t:now-i*61000, o:+o.toFixed(2), h:hi, l:lo, c:+p.toFixed(2), v:Math.floor(4e5+Math.random()*2e6)});
  }
  return cs;
}

// ─── INIT ────────────────────────────────────────────────
STOCKS.forEach(s => {
  stockData[s.sym] = {...s, candles:genHistory(s.seed,s.vol), live:false};
});

// ─── LIVE FETCH ──────────────────────────────────────────
async function fetchLive(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxy, {signal:AbortSignal.timeout(8000)});
    if (!r.ok) return null;
    const j = await r.json();
    const res = JSON.parse(j.contents)?.chart?.result?.[0];
    if (!res) return null;
    const q = res.indicators.quote[0];
    const cs = res.timestamp.map((t,i) => ({
      t:t*1000,
      o:+(q.open[i]||0).toFixed(2),
      h:+(q.high[i]||0).toFixed(2),
      l:+(q.low[i]||0).toFixed(2),
      c:+(q.close[i]||0).toFixed(2),
      v:q.volume[i]||0
    })).filter(c=>c.c>0.01);
    return cs.length>10 ? cs : null;
  } catch(e){return null;}
}

(async()=>{
  try {
    const results = await Promise.all(
      STOCKS.map(s=>fetchLive(s.sym).then(c=>({sym:s.sym,candles:c})))
    );
    let any=false;
    results.forEach(({sym,candles})=>{
      if(candles){stockData[sym].candles=candles;stockData[sym].live=true;any=true;}
    });
    liveMode=any;
    const mb=document.getElementById('modebar'),md=document.getElementById('modedot'),mt=document.getElementById('modetext');
    const dot=document.querySelector('#logo .dot');
    if(any){
      mb.style.background='#f0faf5';mb.style.color='#00a060';
      md.style.background='#00c878';
      mt.innerHTML='<strong>● LIVE</strong> — Real market prices via Yahoo Finance';
      if(dot){dot.style.background='#00c878';dot.style.boxShadow='0 0 8px #00c878';}
    } else {
      mb.style.background='#fff9f0';mb.style.color='#c47a00';
      md.style.background='#f5a623';
      mt.innerHTML='<strong>⚡ SIM MODE</strong> — Realistic market engine (markets may be closed)';
      if(dot){dot.style.background='#f5a623';dot.style.boxShadow='0 0 8px #f5a623';}
    }
  } catch(e){}
  renderAll();
})();

// ─── TICK (no full DOM re-render!) ───────────────────────
setInterval(()=>{
  Object.keys(stockData).forEach(sym=>{
    const s=stockData[sym],cs=s.candles,last=cs[cs.length-1];
    const nc=gbm(last.c,s.vol);
    cs[cs.length-1]={...last,c:nc,h:+Math.max(last.h,nc).toFixed(2),l:+Math.min(last.l,nc).toFixed(2)};
    if(Date.now()-last.t>62000){
      cs.push({t:Date.now(),o:last.c,h:nc,l:nc,c:nc,v:Math.floor(4e5+Math.random()*1.5e6)});
      if(cs.length>600)cs.shift();
    }
  });
  const pv=portValue();
  portHistory.push(+(bal+pv).toFixed(2));
  if(portHistory.length>300)portHistory.shift();

  // Smart update — only repaint what's needed
  updateHeader();
  updateTickerPrices();
  if(curTab==='chart'){
    updatePriceDisplay();
    drawChart();
  } else if(curTab==='port'){
    drawPortChart();
    updatePortPositions();
  }
}, 3000);

// ─── HELPERS ─────────────────────────────────────────────

// ─── DRAW CANDLESTICK CHART ──────────────────────────────
function drawChart(){
  const canvas=document.getElementById('cvs');
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  if(!W||!H)return;

  // Only resize if needed
  if(canvas.width!==W*dpr||canvas.height!==H*dpr){
    canvas.width=W*dpr;canvas.height=H*dpr;
  }
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const all=stockData[sel].candles;
  const count=tf==='1D'?Math.min(390,all.length):tf==='5D'?Math.min(90,all.length):all.length;
  const cs=all.slice(-count);
  if(cs.length<2)return;

  // Price range with padding
  const maxP=Math.max(...cs.map(c=>c.h))*1.005;
  const minP=Math.min(...cs.map(c=>c.l))*0.995;
  const range=maxP-minP||1;

  const pL=6,pR=70,pT=14,pB=32;
  const cW=W-pL-pR,cH=H-pT-pB;
  const toY=p=>pT+cH-((p-minP)/range)*cH;
  const colW=cW/cs.length;
  const bW=Math.max(1.5,Math.min(colW-1,12));

  // Clear with white
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);

  // Grid lines + price labels
  ctx.font='9px JetBrains Mono, monospace';
  for(let i=0;i<=4;i++){
    const prc=minP+(range/4)*(4-i);
    const y=pT+(cH/4)*i;
    ctx.strokeStyle='#f0f0f5';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR+2,y);ctx.stroke();
    ctx.fillStyle='#b0b0c0';
    ctx.fillText('$'+prc.toFixed(prc>=100?0:2),W-pR+5,y+3);
  }

  // Volume bars (subtle)
  const maxV=Math.max(...cs.map(c=>c.v))||1;
  cs.forEach((c,i)=>{
    const x=pL+i*colW+colW/2,up=c.c>=c.o;
    ctx.fillStyle=up?'rgba(0,200,120,0.10)':'rgba(255,59,92,0.10)';
    const vh=(c.v/maxV)*cH*0.20;
    ctx.fillRect(x-bW/2,pT+cH-vh,bW,vh);
  });

  // Candles
  cs.forEach((c,i)=>{
    const x=pL+i*colW+colW/2;
    const up=c.c>=c.o;
    const green='#00c878',red='#ff3b5c';
    const col=up?green:red;

    // Wick
    ctx.strokeStyle=col;ctx.lineWidth=Math.max(0.8,bW*0.15);
    ctx.beginPath();ctx.moveTo(x,toY(c.h));ctx.lineTo(x,toY(c.l));ctx.stroke();

    // Body
    const by=toY(Math.max(c.o,c.c));
    const bh=Math.max(1.5,Math.abs(toY(c.o)-toY(c.c)));

    if(bW>=3){
      // Filled candle body
      ctx.fillStyle=col;
      ctx.fillRect(x-bW/2,by,bW,bh);
      // Subtle border
      ctx.strokeStyle=up?'#00a060':'#cc1a3a';
      ctx.lineWidth=0.5;
      ctx.strokeRect(x-bW/2,by,bW,bh);
    } else {
      ctx.strokeStyle=col;ctx.lineWidth=bW;
      ctx.beginPath();ctx.moveTo(x,toY(c.o));ctx.lineTo(x,toY(c.c));ctx.stroke();
    }
  });

  // Crosshair price line
  const last=cs.at(-1);
  const ly=toY(last.c);
  const up0=last.c>=cs[0].c;
  ctx.setLineDash([4,4]);
  ctx.strokeStyle=up0?'rgba(0,200,120,0.5)':'rgba(255,59,92,0.5)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pL,ly);ctx.lineTo(W-pR,ly);ctx.stroke();
  ctx.setLineDash([]);

  // Price tag (pill)
  const tagW=pR-4,tagH=18,tagX=W-pR+2,tagY=ly-tagH/2;
  const tagColor=up0?'#00c878':'#ff3b5c';
  ctx.fillStyle=tagColor;
  ctx.beginPath();
  ctx.roundRect(tagX,tagY,tagW,tagH,4);
  ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.font='bold 9px JetBrains Mono, monospace';
  ctx.fillText('$'+last.c.toFixed(2),tagX+4,tagY+12);

  // X-axis timestamps (sparse)
  ctx.fillStyle='#c0c0d0';ctx.font='9px JetBrains Mono, monospace';
  const step=Math.floor(cs.length/4);
  for(let i=0;i<cs.length;i+=step){
    const x=pL+i*colW;
    const d=new Date(cs[i].t);
    const lbl=tf==='ALL'?d.toLocaleDateString('en',{month:'short',day:'numeric'})
                        :(d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'));
    ctx.fillText(lbl,x,H-8);
  }
}

// ─── PORTFOLIO CHART ─────────────────────────────────────
function drawPortChart(){
  const canvas=document.getElementById('portChart');
  if(!canvas||portHistory.length<2)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  if(!W||!H)return;
  if(canvas.width!==W*dpr||canvas.height!==H*dpr){canvas.width=W*dpr;canvas.height=H*dpr;}
  const ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);

  const vals=portHistory;
  const maxV=Math.max(...vals)*1.02,minV=Math.min(...vals)*0.98;
  const range=maxV-minV||1;
  const pL=4,pR=4,pT=8,pB=8;
  const cW=W-pL-pR,cH=H-pT-pB;
  const toX=i=>pL+(i/(vals.length-1))*cW;
  const toY=v=>pT+cH-((v-minV)/range)*cH;
  const up=vals.at(-1)>=vals[0];
  const col=up?'#00c878':'#ff3b5c';

  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);

  // Gradient fill
  const grad=ctx.createLinearGradient(0,pT,0,pT+cH);
  grad.addColorStop(0,up?'rgba(0,200,120,0.2)':'rgba(255,59,92,0.2)');
  grad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));
  vals.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
  ctx.lineTo(toX(vals.length-1),pT+cH);ctx.lineTo(toX(0),pT+cH);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));
  vals.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
}

// ─── ORDER ───────────────────────────────────────────────
function placeOrder(){
  const q=parseFloat(document.getElementById('qInp')?.value)||0;
  if(q<=0){toast('⚠️ Enter a valid share amount');return;}
  const last=stockData[sel].candles.at(-1);
  const cost=+(q*last.c).toFixed(2);
  if(side==='buy'){
    if(cost>bal){toast(`⚠️ Need $${fmt(cost)}, have $${fmt(bal)}`);return;}
    bal=+(bal-cost).toFixed(2);
    const ex=port[sel]||{shares:0,avg:0};
    const ns=+(ex.shares+q).toFixed(6);
    port[sel]={shares:ns,avg:+((ex.shares*ex.avg+cost)/ns).toFixed(2)};
    toast(`✓ Bought ${q} × ${sel} @ $${last.c.toFixed(2)}`);
  } else {
    if(!port[sel]||port[sel].shares<q){toast('⚠️ Not enough shares to sell');return;}
    bal=+(bal+cost).toFixed(2);
    const ns=+(port[sel].shares-q).toFixed(6);
    if(ns<=0.000001)delete port[sel];
    else port[sel]={...port[sel],shares:ns};
    toast(`✓ Sold ${q} × ${sel} @ $${last.c.toFixed(2)}`);
  }
  txs.unshift({time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),sym:sel,side,shares:q,price:last.c,total:cost});
  if(txs.length>200)txs.pop();
  renderAll();
}

      </div>
      <div class="stat-box">
        <div class="stat-label">Win Rate</div>
        <div class="stat-val ${winRate>=50?'g':'r'}">${winRate}%</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Positions</div>
        <div class="stat-val">${Object.keys(port).length}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Cash</div>
        <div class="stat-val" style="font-size:13px">$${fmt(bal)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">P&L $</div>
        <div class="stat-val ${pnl>=0?'g':'r'}" style="font-size:13px">${pnl>=0?'+':''}$${fmt(pnl)}</div>
      </div>
    </div>

    <div class="section-label" style="margin-top:4px">Best Trade</div>
    <div class="account-card">
      <div class="acc-row">
        <span class="acc-key">Symbol</span>
        <span class="acc-val">${bestTrade.sym}</span>
      </div>
      <div class="acc-row">
        <span class="acc-key">P&L</span>
        <span class="acc-val ${bestTrade.pnl>=0?'g':'r'}">${bestTrade.pnl>=0?'+':''}$${bestTrade.pnl.toFixed(2)}</span>
      </div>
    </div>

    <div class="section-label">Breakdown by Stock</div>
    ${STOCKS.filter(s=>port[s.sym]||txs.find(t=>t.sym===s.sym)).map(s=>{
      const cp=stockData[s.sym].candles.at(-1).c;
      const cs2=stockData[s.sym].candles,prev2=cs2.at(-2)||cs2.at(-1);
      const dayChg=((cp-prev2.c)/prev2.c*100);
      const pos2=port[s.sym];
      const posPnl=pos2?(cp-pos2.avg)*pos2.shares:0;
      const pu=dayChg>=0;
      return `<div class="tx-item" onclick="selectStock('${s.sym}');showTab('chart')">
        <div>
          <div class="tx-sym">${s.sym}</div>
          <div class="tx-time">${s.name}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace">$${cp.toFixed(2)}</div>
          <div class="tx-time ${pu?'g':'r'}">${pu?'▲':'▼'}${Math.abs(dayChg).toFixed(2)}%</div>
        </div>
        <div>
          ${pos2?`<div class="tx-amt ${posPnl>=0?'g':'r'}">${posPnl>=0?'+':''}$${posPnl.toFixed(2)}</div>
          <div class="tx-price">${pos2.shares} shares</div>`
          :`<div class="tx-amt" style="color:var(--text3)">—</div>`}
        </div>
      </div>`;
    }).join('')||'<div class="empty"><div class="empty-icon">📊</div>Make some trades first!</div>'}

    <div style="margin-top:16px;padding:14px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);text-align:center">
      <button onclick="if(confirm('Reset to $25,000?')){resetAccount()}" style="padding:12px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:13px;font-weight:700;color:var(--text2)">
        🔄 Reset Account to $25,000
      </button>
    </div>
  `;
}

function resetAccount(){
  bal=SB;port={};txs=[];portHistory=[SB];
  toast('✓ Account reset to $25,000');
  renderAll();
}

// ─── START ───────────────────────────────────────────────
renderAll();
</script>

</body>
</html>
