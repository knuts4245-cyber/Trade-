<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PaperTrade Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#21262d;
  --bg4:#30363d;
  --border:#30363d;
  --border2:#484f58;
  --text1:#e6edf3;
  --text2:#8b949e;
  --text3:#484f58;
  --green:#3fb950;
  --green-bg:rgba(63,185,80,.1);
  --green-dim:rgba(63,185,80,.15);
  --red:#f85149;
  --red-bg:rgba(248,81,73,.1);
  --red-dim:rgba(248,81,73,.15);
  --blue:#58a6ff;
  --blue-bg:rgba(88,166,255,.1);
  --gold:#d29922;
  --gold-bg:rgba(210,153,34,.1);
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --ma20:#58a6ff;
  --ma50:#d29922;
}
body{background:var(--bg);color:var(--text1);font-family:var(--sans);max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100dvh;}
button{cursor:pointer;background:none;border:none;color:inherit;font-family:var(--sans);outline:none;-webkit-tap-highlight-color:transparent}
input{font-family:var(--mono);outline:none;border:none}
::-webkit-scrollbar{width:0;height:0}

/* HEADER */
#hdr{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:10px 16px 9px;
  flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;z-index:50;
}
#logo{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text1);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:var(--mono)}
.pill.live{background:var(--green-dim);color:var(--green)}
.pill.sim{background:var(--gold-bg);color:var(--gold)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#hdr-right{text-align:right}
#hdr-val{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:-.5px}
#hdr-pnl{font-family:var(--mono);font-size:10px;font-weight:600;margin-top:1px}

/* TICKER STRIP */
#ticker{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;
  padding:0;gap:0;
  scrollbar-width:none;
}
#ticker::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:7px 14px;
  cursor:pointer;transition:all .12s;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  border-bottom:2px solid transparent;
  min-width:68px;
}
.chip.on{background:var(--blue-bg);border-bottom-color:var(--blue)}
.chip-sym{font-size:10px;font-weight:700;color:var(--text2);font-family:var(--mono)}
.chip.on .chip-sym{color:var(--blue)}
.chip-price{font-size:10px;font-family:var(--mono);color:var(--text3)}
.chip-chg{font-size:9px;font-weight:700;font-family:var(--mono)}

/* SCREENS */
.screen{
  position:absolute;inset:0 0 56px 0;
  display:flex;flex-direction:column;
  background:var(--bg);
  max-width:430px;margin:0 auto;
  transition:opacity .15s;
}
.screen.off{opacity:0;pointer-events:none}
#chartScreen{top:0;left:0;right:0;bottom:56px}

/* PRICE ROW */
#price-row{
  padding:10px 14px 4px;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:flex-end;
}
#pr-name{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.3px;margin-bottom:3px;text-transform:uppercase;font-family:var(--mono)}
#pr-price{font-family:var(--mono);font-size:24px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text1)}
#pr-right{text-align:right}
#pr-chg{font-family:var(--mono);font-size:13px;font-weight:700}
#pr-pct{font-family:var(--mono);font-size:10px;font-weight:600;margin-top:2px}

/* TF BAR */
#tf-row{
  padding:5px 14px 5px;
  display:flex;align-items:center;gap:2px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.tf-btn{
  padding:4px 10px;border-radius:4px;
  font-size:10px;font-weight:700;font-family:var(--mono);
  color:var(--text3);background:transparent;transition:all .1s;
}
.tf-btn.on{background:var(--bg3);color:var(--text1)}
.tf-sep{width:1px;height:14px;background:var(--border);margin:0 4px;flex-shrink:0}
.ind-btn{
  padding:4px 9px;border-radius:4px;
  font-size:10px;font-weight:700;font-family:var(--mono);
  color:var(--text3);background:transparent;border:1px solid transparent;transition:all .1s;
}
.ind-btn.on{color:var(--blue);border-color:var(--border2)}
#vol-lbl{margin-left:auto;font-size:9px;color:var(--text3);font-family:var(--mono)}

/* CHART */
#chart-wrap{flex:1;min-height:0;position:relative;overflow:hidden;cursor:crosshair}
#cvs{position:absolute;inset:0;width:100%;height:100%}
#tip{
  position:absolute;top:8px;left:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:5px;padding:5px 10px;
  font-size:9px;font-family:var(--mono);color:var(--text2);
  pointer-events:none;display:none;white-space:nowrap;
  line-height:2;z-index:10;
}
#legend{
  position:absolute;bottom:8px;left:10px;
  display:flex;gap:10px;pointer-events:none;z-index:5;
}
.leg{font-size:9px;font-family:var(--mono);font-weight:600;display:flex;align-items:center;gap:4px;color:var(--text3)}
.leg-line{width:14px;height:2px;border-radius:1px;flex-shrink:0}

/* TRADE PANEL */
#trade{
  background:var(--bg2);
  border-top:1px solid var(--border);
  flex-shrink:0;padding:10px 14px;
  padding-bottom:max(10px,env(safe-area-inset-bottom,0px));
}
.t-row1{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.side-toggle{
  display:flex;background:var(--bg3);border-radius:6px;
  border:1px solid var(--border);overflow:hidden;flex:1;
}
.side-btn{
  flex:1;padding:8px 0;font-weight:700;font-size:11px;
  letter-spacing:.5px;font-family:var(--mono);
  color:var(--text3);background:transparent;
  transition:all .15s;border-radius:5px;margin:2px;
}
.side-btn.buy.on{background:var(--green);color:#0d1117}
.side-btn.sell.on{background:var(--red);color:#fff}
.cash-info{margin-left:4px;text-align:right;flex-shrink:0}
.cash-lbl{font-size:8px;color:var(--text3);font-weight:600;letter-spacing:.8px;text-transform:uppercase;font-family:var(--mono)}
.cash-amt{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text2)}

.t-row2{display:flex;gap:8px;align-items:stretch;margin-bottom:6px}
.qty-wrap{
  flex:1;display:flex;align-items:stretch;
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  overflow:hidden;transition:border-color .12s;
}
.qty-wrap:focus-within{border-color:var(--blue)}
.q-btn{
  width:38px;background:var(--bg4);color:var(--text2);
  font-size:18px;font-weight:300;display:flex;
  align-items:center;justify-content:center;
  flex-shrink:0;min-height:42px;transition:background .1s;
  cursor:pointer;
}
.q-btn:active{background:var(--border2)}
#qty{
  flex:1;padding:6px 2px;background:transparent;
  color:var(--text1);font-size:16px;font-weight:700;
  text-align:center;min-width:0;
}
.exec{
  padding:0 22px;border-radius:6px;
  font-size:13px;font-weight:700;font-family:var(--mono);
  min-height:42px;letter-spacing:.5px;
  transition:all .12s;flex-shrink:0;cursor:pointer;border:none;
}
.exec:active{transform:scale(.96)}
.exec.buy{background:var(--green);color:#0d1117}
.exec.sell{background:var(--red);color:#fff}

.t-row3{display:flex;justify-content:space-between;align-items:center}
.t-info{font-size:10px;color:var(--text3);font-family:var(--mono)}
.t-info b{color:var(--text2)}
.t-pos{font-size:10px;font-family:var(--mono);font-weight:700}

/* SCROLLABLE SCREENS */
#portScreen,#histScreen,#statsScreen{
  top:0;left:0;right:0;bottom:56px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px;
}

/* SHARED */
.sec{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);margin:16px 0 8px}
.sec:first-child{margin-top:0}
.card{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.row:last-child{border-bottom:none}
.rk{color:var(--text3)}.rv{font-family:var(--mono);font-weight:700;color:var(--text1)}
.pnl-badge{margin-top:10px;padding:10px;border-radius:6px;text-align:center;font-family:var(--mono);font-weight:700;font-size:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.sbox{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:10px 6px;text-align:center}
.slbl{font-size:8px;color:var(--text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:4px}
.sval{font-family:var(--mono);font-weight:700;font-size:16px}
.pos-card{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:12px 13px 10px 14px;margin-bottom:6px;cursor:pointer;position:relative;overflow:hidden;transition:background .12s}
.pos-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.pos-card.up::before{background:var(--green)}
.pos-card.dn::before{background:var(--red)}
.pos-card:active{background:var(--bg3)}
.pc-top{display:flex;justify-content:space-between;margin-bottom:3px}
.pc-sym{font-weight:700;font-size:15px;font-family:var(--mono)}
.pc-sh{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.pc-val{font-family:var(--mono);font-weight:700;font-size:13px;text-align:right}
.pc-pnl{font-family:var(--mono);font-size:11px;font-weight:700;text-align:right;margin-top:1px}
.pc-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.tx{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:10px 13px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .12s}
.tx:active{background:var(--bg3)}
.tx-sym{font-weight:700;font-size:13px;font-family:var(--mono)}
.tx-dt{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.badge{padding:3px 7px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:var(--mono)}
.badge.buy{background:var(--green-dim);color:var(--green)}
.badge.sell{background:var(--red-dim);color:var(--red)}
.tx-sh{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:3px;text-align:center}
.tx-amt{font-family:var(--mono);font-weight:700;font-size:13px;text-align:right}
.tx-at{font-size:9px;color:var(--text3);font-family:var(--mono);text-align:right;margin-top:1px}
.wl{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:11px 13px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .12s}
.wl:active{background:var(--bg3)}
.wl-sym{font-weight:700;font-size:13px;font-family:var(--mono)}
.wl-name{font-size:10px;color:var(--text3);margin-top:1px}
.pchart{background:var(--bg2);border-radius:8px;border:1px solid var(--border);height:100px;position:relative;margin-bottom:8px;overflow:hidden}
#portCvs{position:absolute;inset:0;width:100%;height:100%}
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px;line-height:2}
.up{color:var(--green)}.dn{color:var(--red)}

/* BOTTOM NAV */
#nav{
  position:fixed;bottom:0;left:0;right:0;
  max-width:430px;margin:0 auto;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;height:56px;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;
  font-size:8px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
  color:var(--text3);transition:color .12s;
  border-top:2px solid transparent;min-height:44px;
  cursor:pointer;
}
.nb.on{color:var(--blue);border-top-color:var(--blue)}
.nb svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* TOAST */
#toast{
  position:fixed;bottom:68px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--bg3);color:var(--text1);border:1px solid var(--border2);
  padding:9px 18px;border-radius:100px;
  font-size:11px;font-weight:600;font-family:var(--mono);
  z-index:999;opacity:0;transition:all .2s;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">
    PAPERTRADE
    <div class="pill sim" id="pill"><span class="dot"></span><span id="pill-txt">SIM</span></div>
  </div>
  <div id="hdr-right">

<!-- CHART SCREEN -->

<!-- PORTFOLIO SCREEN -->

<!-- HISTORY SCREEN -->

<script>
'use strict';

const START = 25000;
const STOCKS = [
  {sym:'AAPL', name:'Apple Inc.',      seed:213.50, vol:.018, drift:.00008},
  {sym:'TSLA', name:'Tesla Inc.',      seed:248.00, vol:.040, drift:.00015},
  {sym:'NVDA', name:'NVIDIA Corp.',    seed:875.00, vol:.038, drift:.00020},
  {sym:'MSFT', name:'Microsoft Corp.', seed:415.00, vol:.016, drift:.00007},
  {sym:'AMZN', name:'Amazon.com',      seed:195.00, vol:.022, drift:.00010},
  {sym:'META', name:'Meta Platforms',  seed:510.00, vol:.026, drift:.00012},
  {sym:'GOOGL',name:'Alphabet Inc.',   seed:175.00, vol:.019, drift:.00008},
  {sym:'JPM',  name:'JPMorgan Chase',  seed:198.00, vol:.014, drift:.00005},
  {sym:'SPY',  name:'S&P 500 ETF',     seed:512.00, vol:.010, drift:.00006},
  {sym:'GME',  name:'GameStop Corp.',  seed:18.50,  vol:.072, drift:-.00010},
];

let bal = START, port = {}, txs = [], sel = 'AAPL';
let curTab = 'chart', side = 'buy', tf = '1D';
let showMA = true, showVol = true;
let D = {};
let portHist = [START];
let crossIdx = -1;
let rafPending = false;

function randn() {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  do { v = Math.random(); } while (v === 0);
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function nextClose(price, vol, drift, fair) {
  const rev = 0.005 * Math.log(fair / Math.max(price, 0.01));
  const shock = vol * 0.016 * randn();
  return Math.max(price * 0.6, price * Math.exp(drift + rev + shock));
}

function buildCandles(seed, vol, drift, n = 390) {
  const fair = seed;
  let p = seed * (0.94 + Math.random() * 0.12);
  const now = Date.now();
  const cs = [];
  for (let i = n; i >= 0; i--) {
    const o = +p.toFixed(2);
    for (let j = 0; j < 4; j++) p = nextClose(p, vol, drift / 4, fair);
    const c = +p.toFixed(2);
    const intraVol = vol * Math.abs(o) * (0.25 + Math.random() * 0.55);
    const h = +(Math.max(o, c) + intraVol * Math.random() * 0.5).toFixed(2);
    const l = +(Math.min(o, c) - intraVol * Math.random() * 0.5).toFixed(2);
    const v = Math.floor(2e5 + Math.random() * 3e6);
    cs.push({ t: now - i * 61000, o, h: Math.max(h, o, c), l: Math.min(l, o, c), c, v });
  }
  return cs;
}

STOCKS.forEach(s => {
  D[s.sym] = { ...s, candles: buildCandles(s.seed, s.vol, s.drift), live: false };
});

async function fetchLive(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`;
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(9000) });
    if (!r.ok) return null;
    const j = await r.json();
    const res = JSON.parse(j.contents)?.chart?.result?.[0];
    if (!res) return null;
    const q = res.indicators.quote[0];
    const cs = res.timestamp.map((t, i) => ({
      t: t * 1000,
      o: +(q.open[i] || 0).toFixed(2),
      h: +(q.high[i] || 0).toFixed(2),
      l: +(q.low[i] || 0).toFixed(2),
      c: +(q.close[i] || 0).toFixed(2),
      v: q.volume[i] || 0,
    })).filter(c => c.c > 0.01);
    return cs.length > 10 ? cs : null;
  } catch { return null; }
}

function g(id) { return document.getElementById(id); }

function portVal() { return Object.entries(port).reduce((s, [sym, p]) => s + p.shares * D[sym].candles.at(-1).c, 0); }

function toast(msg) {

function calcMA(cs, p) {
  return cs.map((_, i) => i < p - 1 ? null : cs.slice(i - p + 1, i + 1).reduce((s, c) => s + c.c, 0) / p);
}
function slice() {
  const all = D[sel].candles;
  const n = tf === '1D' ? Math.min(195, all.length) : tf === '5D' ? Math.min(100, all.length) : all.length;

function schedDraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; draw(); });
}

function draw() {
  const canvas = g('cvs'); if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;
  const tw = Math.round(W * dpr), th = Math.round(H * dpr);
  if (canvas.width !== tw || canvas.height !== th) { canvas.width = tw; canvas.height = th; }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cs = slice(); if (cs.length < 2) return;

  const VOL_H = showVol ? Math.round(H * 0.2) : 0;
  const PAD_L = 4, PAD_R = 62, PAD_T = 8, PAD_B = 4;
  const CANDLE_H = H - PAD_T - PAD_B - VOL_H - (showVol ? 8 : 0);
  const volTop = PAD_T + CANDLE_H + 8;

  const hiP = Math.max(...cs.map(c => c.h));
  const loP = Math.min(...cs.map(c => c.l));
  const pad = (hiP - loP) * 0.1;
  const priceHi = hiP + pad, priceLo = Math.max(0.01, loP - pad);
  const priceRange = priceHi - priceLo;
  const toY = p => PAD_T + CANDLE_H - ((p - priceLo) / priceRange) * CANDLE_H;

  const cW = (W - PAD_L - PAD_R) / cs.length;
  const bW = Math.max(1.5, Math.min(cW - 1.5, 9));

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'left';
  const gridCount = 5;
  for (let i = 0; i <= gridCount; i++) {
    const prc = priceLo + (priceRange / gridCount) * i;
    const y = toY(prc);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    ctx.fillStyle = '#484f58';
    ctx.fillText(prc >= 100 ? '$' + prc.toFixed(0) : '$' + prc.toFixed(2), W - PAD_R + 5, y + 3);
  }

  // Time labels
  const step = Math.max(1, Math.floor(cs.length / 4));
  ctx.fillStyle = '#484f58'; ctx.font = '8px JetBrains Mono, monospace';
  for (let i = 0; i < cs.length; i += step) {
    const x = PAD_L + (i + 0.5) * cW;
    const d = new Date(cs[i].t);
    const lbl = tf === '1M'
      ? d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
      : d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    ctx.fillText(lbl, x - 12, H - (showVol ? VOL_H + 4 : 2));
  }

  // Volume
  if (showVol && VOL_H > 0) {
    const maxV = Math.max(...cs.map(c => c.v)) || 1;
    cs.forEach((c, i) => {
      const x = PAD_L + i * cW;
      const up = c.c >= c.o;
      const vh = Math.max(1, (c.v / maxV) * (VOL_H - 6));
      ctx.fillStyle = up ? 'rgba(63,185,80,.35)' : 'rgba(248,81,73,.35)';
      ctx.fillRect(x + 0.5, volTop + (VOL_H - 6) - vh, Math.max(1, bW), vh);
    });
    ctx.fillStyle = '#484f58'; ctx.font = '8px JetBrains Mono, monospace';
    ctx.fillText('VOL', W - PAD_R + 5, volTop + 11);
  }

  // MA lines
  if (showMA && cs.length >= 20) {
    const drawLine = (vals, color, width) => {
      ctx.beginPath();
      let started = false;
      vals.forEach((v, i) => {
        if (v === null) return;
        const x = PAD_L + (i + 0.5) * cW, y = toY(v);
        started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true);
      });
      ctx.strokeStyle = color; ctx.lineWidth = width;
      ctx.setLineDash([]); ctx.stroke();
    };
    drawLine(calcMA(cs, Math.min(50, cs.length)), 'rgba(210,153,34,.8)', 1.2);
    drawLine(calcMA(cs, 20), 'rgba(88,166,255,.9)', 1.2);
  }

  // Candles
  cs.forEach((c, i) => {
    const x = PAD_L + (i + 0.5) * cW;
    const up = c.c >= c.o;
    const col = up ? '#3fb950' : '#f85149';
    const wickW = Math.max(0.8, bW * 0.12);
    ctx.fillStyle = col;
    const wickTop = toY(c.h), wickBot = toY(c.l);
    ctx.fillRect(x - wickW / 2, wickTop, wickW, Math.max(1, wickBot - wickTop));
    const bodyTop = toY(Math.max(c.o, c.c));
    const bodyBot = toY(Math.min(c.o, c.c));
    const bodyH = Math.max(1.5, bodyBot - bodyTop);
    ctx.fillStyle = col;
    ctx.fillRect(x - bW / 2, bodyTop, Math.max(1.5, bW), bodyH);
  });

  // Crosshair
  if (crossIdx >= 0 && crossIdx < cs.length) {
    const x = PAD_L + (crossIdx + 0.5) * cW;
    ctx.strokeStyle = 'rgba(255,255,255,.12)';
    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, PAD_T + CANDLE_H); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Last price line
  const last = cs.at(-1);
  const lastY = toY(last.c);
  const dayUp = last.c >= cs[0].c;
  ctx.strokeStyle = dayUp ? 'rgba(63,185,80,.4)' : 'rgba(248,81,73,.4)';
  ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(PAD_L, lastY); ctx.lineTo(W - PAD_R, lastY); ctx.stroke();
  ctx.setLineDash([]);

  // Price tag
  const tagW = 56, tagH = 16;
  ctx.fillStyle = dayUp ? '#3fb950' : '#f85149';
  ctx.beginPath();
  ctx.roundRect(W - PAD_R + 3, lastY - tagH / 2, tagW, tagH, 3);
  ctx.fill();
  ctx.fillStyle = '#0d1117'; ctx.font = 'bold 9px JetBrains Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('$' + last.c.toFixed(2), W - PAD_R + 7, lastY + 4);
}

// Crosshair
const chartWrap = g('chart-wrap');
function handlePointer(clientX) {
  const rect = g('cvs').getBoundingClientRect();
  const cs = slice();
  const cW = (rect.width - 4 - 62) / cs.length;
  const x = clientX - rect.left - 4;
  const idx = Math.max(0, Math.min(cs.length - 1, Math.floor(x / cW)));
  crossIdx = idx;
  const c = cs[idx], up = c.c >= c.o;
  const d = new Date(c.t);
  const lbl = tf === '1M'
    ? d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
    : d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
  const tip = g('tip');
  tip.innerHTML = `<span style="color:#8b949e">${lbl}</span> &nbsp; O:<b>$${c.o.toFixed(2)}</b> H:<b style="color:#3fb950">$${c.h.toFixed(2)}</b> L:<b style="color:#f85149">$${c.l.toFixed(2)}</b> C:<b style="color:${up ? '#3fb950' : '#f85149'}">$${c.c.toFixed(2)}</b>`;
  tip.style.display = 'block';
  schedDraw();
}
function clearCrosshair() { crossIdx = -1; g('tip').style.display = 'none'; schedDraw(); }
chartWrap.addEventListener('touchmove', e => { e.preventDefault(); handlePointer(e.touches[0].clientX); }, { passive: false });
chartWrap.addEventListener('touchend', clearCrosshair);
chartWrap.addEventListener('mousemove', e => handlePointer(e.clientX));
chartWrap.addEventListener('mouseleave', clearCrosshair);

function setSide(s) {
  side = s;
  g('buyBtn').className = 'side-btn buy' + (s === 'buy' ? ' on' : '');
  g('sellBtn').className = 'side-btn sell' + (s === 'sell' ? ' on' : '');
  g('execBtn').textContent = s === 'buy' ? 'BUY' : 'SELL';
  g('execBtn').className = 'exec ' + s;
  updCost();
}
function adjQ(d) {
  const el = g('qty');
  el.value = Math.max(1, (parseInt(el.value) || 1) + d);
  updCost();
}
function updCost() {
  const q = parseFloat(g('qty')?.value) || 0;
  const p = D[sel].candles.at(-1).c;
  g('estCost').textContent = '$' + (q * p).toFixed(2);
}
function updatePosTag() {
  const pos = port[sel], el = g('posTag');
  if (!el) return;
  if (pos) {
    const cp = D[sel].candles.at(-1).c;
    const pnl = +((cp - pos.avg) * pos.shares).toFixed(2), up = pnl >= 0;
    el.textContent = pos.shares + ' sh · ' + (up ? '+' : '') + '$' + pnl.toFixed(2);
    el.className = 't-pos ' + (up ? 'up' : 'dn');
  } else { el.textContent = ''; }
}
function placeOrder() {
  const q = parseFloat(g('qty').value) || 0;
  if (q <= 0) { toast('⚠ Enter a quantity'); return; }
  const cp = D[sel].candles.at(-1).c;
  const total = +(q * cp).toFixed(2);
  if (side === 'buy') {
    if (total > bal) { toast('⚠ Insufficient funds'); return; }
    bal = +(bal - total).toFixed(2);
    const ex = port[sel] || { shares: 0, avg: 0 };
    const ns = +(ex.shares + q).toFixed(4);
    port[sel] = { shares: ns, avg: +((ex.shares * ex.avg + total) / ns).toFixed(2) };
    toast('✓ Bought ' + q + ' ' + sel + ' @ $' + cp.toFixed(2));
  } else {
    if (!port[sel] || port[sel].shares < q) { toast('⚠ Not enough shares'); return; }
    bal = +(bal + total).toFixed(2);
    const ns = +(port[sel].shares - q).toFixed(4);
    if (ns < 0.001) delete port[sel]; else port[sel] = { ...port[sel], shares: ns };
    toast('✓ Sold ' + q + ' ' + sel + ' @ $' + cp.toFixed(2));
  }
  txs.unshift({ t: Date.now(), sym: sel, side, shares: q, price: cp, total });
  if (txs.length > 300) txs.pop();
  hdrUpdate(); updatePosTag();
}

function drawPortChart() {
  const c = g('portCvs'); if (!c) return;
  const dpr = window.devicePixelRatio || 1;
  const W = c.offsetWidth, H = c.offsetHeight; if (!W || !H) return;
  c.width = Math.round(W * dpr); c.height = Math.round(H * dpr);
  const ctx = c.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const vals = portHist; if (vals.length < 2) return;
  const hi = Math.max(...vals) * 1.01, lo = Math.min(...vals) * 0.99, rng = hi - lo || 1;
  const toX = i => (i / (vals.length - 1)) * W;
  const toY = v => H - ((v - lo) / rng) * H * 0.88 - H * 0.06;
  const up = vals.at(-1) >= vals[0];
  ctx.fillStyle = '#161b22'; ctx.fillRect(0, 0, W, H);
  ctx.beginPath(); ctx.moveTo(toX(0), toY(vals[0]));
  vals.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
  ctx.lineTo(toX(vals.length - 1), H); ctx.lineTo(0, H); ctx.closePath();
  const g2 = ctx.createLinearGradient(0, 0, 0, H);
  g2.addColorStop(0, up ? 'rgba(63,185,80,.15)' : 'rgba(248,81,73,.15)');
  g2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g2; ctx.fill();
  ctx.beginPath(); ctx.moveTo(toX(0), toY(vals[0]));
  vals.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
  ctx.strokeStyle = up ? '#3fb950' : '#f85149'; ctx.lineWidth = 1.5; ctx.stroke();
}

function renderHist() {
  const bought = txs.filter(t => t.side === 'buy').reduce((s, t) => s + t.total, 0);
  const sold = txs.filter(t => t.side === 'sell').reduce((s, t) => s + t.total, 0);
  g('histScreen').innerHTML = `
    <div class="sec">Trade History (${txs.length})</div>
    ${txs.length ? `<div class="g3">
      <div class="sbox"><div class="slbl">Total</div><div class="sval">${txs.length}</div></div>
      <div class="sbox"><div class="slbl">Bought</div><div class="sval up" style="font-size:11px">$${fmt(bought,0)}</div></div>
      <div class="sbox"><div class="slbl">Sold</div><div class="sval dn" style="font-size:11px">$${fmt(sold,0)}</div></div>
    </div>` : ''}
    ${!txs.length
      ? '<div class="empty">No trades yet.</div>'
      : txs.map(tx => {
          const d = new Date(tx.t);
          const ds = d.toLocaleDateString('en',{month:'short',day:'numeric'}) + ' ' +
                     d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
          return `<div class="tx" onclick="pickStock('${tx.sym}')">
            <div><div class="tx-sym">${tx.sym}</div><div class="tx-dt">${ds}</div></div>
            <div style="text-align:center">
              <div class="badge ${tx.side}">${tx.side.toUpperCase()}</div>
              <div class="tx-sh">${tx.shares} sh</div>
            </div>
            <div><div class="tx-amt">$${fmt(tx.total)}</div><div class="tx-at">@ $${tx.price.toFixed(2)}</div></div>
          </div>`;
        }).join('')}
  `;
}

function renderStats() {
  const pv = portVal(), tv = totalVal(), pnl = +(tv - START).toFixed(2);
  const sells = txs.filter(t => t.side === 'sell');
  const wins = sells.filter(t => {
    const b = txs.find(x => x.sym === t.sym && x.side === 'buy' && x.t < t.t);
    return b ? t.price > b.price : false;
  });
  const wr = sells.length ? Math.round(wins.length / sells.length * 100) : 0;
  const best = sells.reduce((b, t) => {
    const bx = txs.find(x => x.sym === t.sym && x.side === 'buy' && x.t < t.t);
    const p = bx ? (t.price - bx.price) * t.shares : 0;
    return p > b.p ? { sym: t.sym, p } : b;
  }, { sym: '—', p: 0 });

  g('statsScreen').innerHTML = `
    <div class="sec">Performance</div>
    <div class="g3">
      <div class="sbox"><div class="slbl">Return</div><div class="sval ${pnl>=0?'up':'dn'}" style="font-size:13px">${pnl>=0?'+':''}${((pnl/START)*100).toFixed(1)}%</div></div>
      <div class="sbox"><div class="slbl">P&amp;L</div><div class="sval ${pnl>=0?'up':'dn'}" style="font-size:11px">${pnl>=0?'+':''}$${fmt(pnl)}</div></div>
      <div class="sbox"><div class="slbl">Win Rate</div><div class="sval ${wr>=50?'up':'dn'}">${wr}%</div></div>
    </div>
    <div class="g3">
      <div class="sbox"><div class="slbl">Trades</div><div class="sval">${txs.length}</div></div>
      <div class="sbox"><div class="slbl">Positions</div><div class="sval">${Object.keys(port).length}</div></div>
      <div class="sbox"><div class="slbl">Cash</div><div class="sval" style="font-size:11px">$${(bal/1000).toFixed(1)}k</div></div>
    </div>
    <div class="sec">Best Trade</div>
    <div class="card">
      <div class="row"><span class="rk">Symbol</span><span class="rv">${best.sym}</span></div>
      <div class="row"><span class="rk">Profit</span><span class="rv ${best.p>=0?'up':'dn'}">${best.p>=0?'+':''}$${best.p.toFixed(2)}</span></div>
    </div>
    <div class="sec">Watchlist</div>
    ${STOCKS.map(s => {
      const l = D[s.sym].candles.at(-1), p2 = D[s.sym].candles.at(-2) || l;
      const dc = (l.c - p2.c) / p2.c * 100, up = dc >= 0;
      const pos = port[s.sym];
      const posPnl = pos ? (l.c - pos.avg) * pos.shares : null;
      return `<div class="wl" onclick="pickStock('${s.sym}')">
        <div><div class="wl-sym">${s.sym}</div><div class="wl-name">${s.name}</div></div>
        <div style="text-align:center">
          <div style="font-family:var(--mono);font-weight:700;font-size:12px">$${l.c.toFixed(2)}</div>
          <div class="${up?'up':'dn'}" style="font-family:var(--mono);font-size:9px;font-weight:700">${up?'+':''}${dc.toFixed(2)}%</div>
        </div>
        <div style="text-align:right;min-width:64px">
          ${posPnl !== null
            ? `<div class="${posPnl>=0?'up':'dn'}" style="font-family:var(--mono);font-weight:700;font-size:11px">${posPnl>=0?'+':''}$${posPnl.toFixed(2)}</div>
               <div style="font-size:9px;color:var(--text3);font-family:var(--mono)">${pos.shares} sh</div>`
            : `<div style="font-size:10px;color:var(--text3)">—</div>`}
        </div>
      </div>`;
    }).join('')}
    <div style="margin:16px 0 8px;text-align:center">
      <button onclick="if(confirm('Reset account to $25,000?')){bal=START;port={};txs=[];portHist=[START];hdrUpdate();toast('✓ Account reset');renderStats();}"
        style="padding:10px 22px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);cursor:pointer">
        ↺ &nbsp;Reset Account
      </button>
    </div>
  `;
}

// Init
hdrUpdate();
buildTicker();
refreshPriceRow();
setSide('buy');
updCost();
setTimeout(schedDraw, 80);
window.addEventListener('resize', schedDraw);
</script>
</body>
</html>
