<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PaperTrade Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#131722;
  --s1:#1e222d;
  --s2:#2a2e39;
  --s3:#363a45;
  --b1:#363a45;
  --b2:#434651;
  --t1:#d1d4dc;
  --t2:#787b86;
  --t3:#4c505b;
  --green:#26a69a;
  --green2:#1e8a7e;
  --gdim:rgba(38,166,154,.15);
  --red:#ef5350;
  --red2:#c62828;
  --rdim:rgba(239,83,80,.15);
  --blue:#2962ff;
  --blue2:#1e53e5;
  --bluedim:rgba(41,98,255,.12);
  --gold:#f9a825;
  --ma20:#2962ff;
  --ma50:#f9a825;
  --mono:'Roboto Mono',monospace;
  --ui:'Inter',sans-serif;
}
body{
  background:var(--bg);color:var(--t1);
  font-family:var(--ui);
  max-width:430px;margin:0 auto;
  display:flex;flex-direction:column;
  height:100dvh;
}
button{cursor:pointer;background:none;border:none;color:inherit;font-family:var(--ui);outline:none}
input{font-family:var(--mono);outline:none;border:none}
::-webkit-scrollbar{width:0;height:0}

/* в”Ђв”Ђ SCREENS в”Ђв”Ђ */
.screen{
position:absolute;inset:0 0 56px 0;
display:flex;flex-direction:column;
background:var(вЂ“bg);
max-width:430px;margin:0 auto;
transition:opacity .18s;
}
.screen.off{opacity:0;pointer-events:none}

/* в”Ђв”Ђ HEADER в”Ђв”Ђ */
#hdr{
background:var(вЂ“s1);
border-bottom:1px solid var(вЂ“b1);
padding:10px 16px 8px;
flex-shrink:0;
display:flex;justify-content:space-between;align-items:center;
z-index:50;
}
#logo{
font-family:var(вЂ“mono);font-weight:700;font-size:13px;
color:var(вЂ“t1);letter-spacing:.5px;
display:flex;align-items:center;gap:8px;
}
.live-pill{
display:inline-flex;align-items:center;gap:4px;
padding:2px 7px;border-radius:20px;
font-size:8px;font-weight:700;letter-spacing:.8px;
text-transform:uppercase;font-family:var(вЂ“mono);
}
.live-pill.live{background:var(вЂ“gdim);color:var(вЂ“green)}
.live-pill.sim{background:rgba(249,168,37,.1);color:var(вЂ“gold)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#hdr-right{text-align:right}
#hdr-val{font-family:var(вЂ“mono);font-weight:700;font-size:16px;letter-spacing:-.4px;color:var(вЂ“t1)}
#hdr-pnl{font-family:var(вЂ“mono);font-size:10px;font-weight:600;margin-top:1px}

/* в”Ђв”Ђ STOCK PICKER в”Ђв”Ђ full-width scrollable chips в”Ђв”Ђ */
#picker{
background:var(вЂ“s1);border-bottom:1px solid var(вЂ“b1);
display:flex;overflow-x:auto;flex-shrink:0;
-webkit-overflow-scrolling:touch;
padding:6px 8px;gap:6px;
scrollbar-width:none;
}
#picker::-webkit-scrollbar{display:none}
.chip{
flex-shrink:0;
padding:6px 12px;border-radius:6px;
background:var(вЂ“s2);border:1px solid var(вЂ“b1);
cursor:pointer;transition:all .12s;
display:flex;flex-direction:column;align-items:center;gap:2px;
min-width:64px;
}
.chip.on{background:var(вЂ“bluedim);border-color:var(вЂ“blue)}
.chip-sym{font-size:11px;font-weight:700;color:var(вЂ“t2)}
.chip.on .chip-sym{color:var(вЂ“blue)}
.chip-price{font-size:10px;font-family:var(вЂ“mono);color:var(вЂ“t3)}
.chip-chg{font-size:9px;font-weight:700;font-family:var(вЂ“mono)}

/* в”Ђв”Ђ CHART SCREEN в”Ђв”Ђ */
#chartScreen{top:0;left:0;right:0;bottom:56px}

/* Price row */
#price-row{
padding:10px 16px 4px;flex-shrink:0;
display:flex;justify-content:space-between;align-items:flex-end;
}
#pr-left{}
#pr-name{font-size:11px;color:var(вЂ“t3);font-weight:600;letter-spacing:.2px;margin-bottom:4px}
#pr-price{
font-family:var(вЂ“mono);font-size:26px;font-weight:700;
letter-spacing:-1px;line-height:1;color:var(вЂ“t1);
}
#pr-right{text-align:right}
#pr-chg{font-family:var(вЂ“mono);font-size:14px;font-weight:700}
#pr-pct{font-family:var(вЂ“mono);font-size:11px;font-weight:600;margin-top:2px}

/* TF bar вЂ” minimal */
#tf-row{
padding:4px 16px 6px;
display:flex;align-items:center;gap:4px;
flex-shrink:0;
}
.tf-btn{
padding:4px 10px;border-radius:4px;
font-size:10px;font-weight:700;font-family:var(вЂ“mono);
color:var(вЂ“t3);background:transparent;
transition:all .12s;
}
.tf-btn.on{background:var(вЂ“blue);color:#fff}
.sep{width:1px;height:14px;background:var(вЂ“b1);margin:0 2px;flex-shrink:0}
.ind-btn{
padding:4px 9px;border-radius:4px;
font-size:10px;font-weight:700;font-family:var(вЂ“mono);
color:var(вЂ“t3);background:transparent;
border:1px solid transparent;transition:all .12s;
}
.ind-btn.on{color:var(вЂ“gold);border-color:rgba(249,168,37,.3)}
#vol-lbl{margin-left:auto;font-size:9px;color:var(вЂ“t3);font-family:var(вЂ“mono)}

/* Chart canvas вЂ” takes all remaining space */
#chart-wrap{
flex:1;min-height:0;position:relative;
margin:0;overflow:hidden;
cursor:crosshair;
}
#cvs{position:absolute;inset:0;width:100%;height:100%}

/* Hover tooltip вЂ” slim, top of chart */
#tip{
position:absolute;top:6px;left:12px;
background:rgba(30,34,45,.95);border:1px solid var(вЂ“b2);
border-radius:5px;padding:4px 10px;
font-size:9px;font-family:var(вЂ“mono);color:var(вЂ“t2);
pointer-events:none;display:none;white-space:nowrap;
line-height:1.9;z-index:10;
backdrop-filter:blur(6px);
}

/* в”Ђв”Ђ TRADE PANEL в”Ђв”Ђ pinned, always visible в”Ђв”Ђ */
#trade{
background:var(вЂ“s1);border-top:1px solid var(вЂ“b1);
flex-shrink:0;padding:10px 14px;
padding-bottom:max(10px,env(safe-area-inset-bottom,0px));
}
/* Row 1: BUY / SELL toggle + cash */
.t-row1{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.side-btn{
flex:1;padding:8px 0;font-weight:800;font-size:12px;
letter-spacing:.6px;border-radius:5px;
background:var(вЂ“s2);color:var(вЂ“t3);border:1px solid var(вЂ“b1);
transition:all .15s;
}
.side-btn.buy.on{background:var(вЂ“green);color:#fff;border-color:var(вЂ“green);
box-shadow:0 2px 10px rgba(38,166,154,.25)}
.side-btn.sell.on{background:var(вЂ“red);color:#fff;border-color:var(вЂ“red);
box-shadow:0 2px 10px rgba(239,83,80,.25)}
.cash-info{margin-left:auto;text-align:right;flex-shrink:0}
.cash-lbl{font-size:8px;color:var(вЂ“t3);font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.cash-amt{font-family:var(вЂ“mono);font-size:13px;font-weight:700;color:var(вЂ“t2)}
/* Row 2: qty + execute */
.t-row2{display:flex;gap:8px;align-items:stretch;margin-bottom:6px}
.qty-wrap{
flex:1;display:flex;align-items:stretch;
background:var(вЂ“s2);border:1.5px solid var(вЂ“b2);border-radius:5px;
overflow:hidden;transition:border-color .12s;
}
.qty-wrap:focus-within{border-color:var(вЂ“blue)}
.q-btn{
width:36px;background:var(вЂ“s3);color:var(вЂ“t2);
font-size:20px;font-weight:300;display:flex;
align-items:center;justify-content:center;
flex-shrink:0;min-height:42px;transition:background .1s;
}
.q-btn:active{background:var(вЂ“b2)}
#qty{
flex:1;padding:6px 2px;background:transparent;
color:var(вЂ“t1);font-size:17px;font-weight:700;
text-align:center;min-width:0;
}
.exec{
padding:0 20px;border-radius:5px;
font-size:14px;font-weight:800;color:#fff;
min-height:42px;letter-spacing:.2px;
transition:all .12s;flex-shrink:0;
}
.exec:active{transform:scale(.96)}
.exec.buy{background:var(вЂ“green);box-shadow:0 2px 12px rgba(38,166,154,.3)}
.exec.sell{background:var(вЂ“red);box-shadow:0 2px 12px rgba(239,83,80,.3)}
/* Row 3: cost + position */
.t-row3{display:flex;justify-content:space-between;align-items:center}
.t-info{font-size:10px;color:var(вЂ“t3);font-family:var(вЂ“mono)}
.t-info b{color:var(вЂ“t2)}
.t-pos{font-size:10px;font-family:var(вЂ“mono);font-weight:700}

/* в”Ђв”Ђ SCROLLABLE SCREENS в”Ђв”Ђ */
#portScreen,#histScreen,#statsScreen{
top:0;left:0;right:0;bottom:56px;
overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:14px 14px 14px;
}

/* в”Ђв”Ђ SHARED COMPONENTS в”Ђв”Ђ */
.sec{
font-size:9px;color:var(вЂ“t3);font-weight:700;
letter-spacing:1.2px;text-transform:uppercase;
font-family:var(вЂ“mono);margin:16px 0 8px;
}
.sec:first-child{margin-top:0}
.card{
background:var(вЂ“s1);border-radius:8px;
border:1px solid var(вЂ“b1);padding:14px;margin-bottom:10px;
}
.row{
display:flex;justify-content:space-between;
padding:7px 0;border-bottom:1px solid var(вЂ“b1);font-size:13px;
}
.row:last-child{border-bottom:none}
.rk{color:var(вЂ“t3)}.rv{font-family:var(вЂ“mono);font-weight:700;color:var(вЂ“t1)}
.pnl-badge{
margin-top:10px;padding:10px;border-radius:6px;
text-align:center;font-family:var(вЂ“mono);font-weight:800;font-size:15px;
}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.sbox{background:var(вЂ“s1);border-radius:7px;border:1px solid var(вЂ“b1);padding:10px 6px;text-align:center}
.slbl{font-size:8px;color:var(вЂ“t3);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(вЂ“mono);margin-bottom:4px}
.sval{font-family:var(вЂ“mono);font-weight:700;font-size:17px}
.pos-card{
background:var(вЂ“s1);border-radius:8px;border:1px solid var(вЂ“b1);
padding:13px 13px 11px 15px;margin-bottom:7px;
cursor:pointer;position:relative;overflow:hidden;transition:background .12s;
}
.pos-card::before{content:вЂ™вЂ™;position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:0 2px 2px 0}
.pos-card.up::before{background:var(вЂ“green)}
.pos-card.dn::before{background:var(вЂ“red)}
.pos-card:active{background:var(вЂ“s2)}
.pc-top{display:flex;justify-content:space-between;margin-bottom:4px}
.pc-sym{font-weight:800;font-size:16px}
.pc-sh{font-size:10px;color:var(вЂ“t3);font-family:var(вЂ“mono);margin-top:2px}
.pc-val{font-family:var(вЂ“mono);font-weight:700;font-size:14px;text-align:right}
.pc-pnl{font-family:var(вЂ“mono);font-size:11px;font-weight:700;text-align:right}
.pc-sub{font-size:10px;color:var(вЂ“t3);font-family:var(вЂ“mono)}
.tx{
background:var(вЂ“s1);border-radius:7px;border:1px solid var(вЂ“b1);
padding:11px 13px;margin-bottom:6px;
display:flex;justify-content:space-between;align-items:center;
cursor:pointer;transition:background .12s;
}
.tx:active{background:var(вЂ“s2)}
.tx-sym{font-weight:800;font-size:14px}
.tx-dt{font-size:9px;color:var(вЂ“t3);font-family:var(вЂ“mono);margin-top:2px}
.badge{padding:3px 7px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;font-family:var(вЂ“mono)}
.badge.buy{background:var(вЂ“gdim);color:var(вЂ“green)}
.badge.sell{background:var(вЂ“rdim);color:var(вЂ“red)}
.tx-sh{font-size:9px;color:var(вЂ“t3);font-family:var(вЂ“mono);margin-top:3px;text-align:center}
.tx-amt{font-family:var(вЂ“mono);font-weight:700;font-size:13px;text-align:right}
.tx-at{font-size:9px;color:var(вЂ“t3);font-family:var(вЂ“mono);text-align:right}
.wl{background:var(вЂ“s1);border-radius:7px;border:1px solid var(вЂ“b1);
padding:12px 13px;margin-bottom:6px;display:flex;justify-content:space-between;
align-items:center;cursor:pointer;transition:background .12s}
.wl:active{background:var(вЂ“s2)}
.wl-sym{font-weight:800;font-size:14px}
.wl-name{font-size:10px;color:var(вЂ“t3);margin-top:1px}
.pchart{
background:var(вЂ“s1);border-radius:8px;border:1px solid var(вЂ“b1);
height:100px;position:relative;margin-bottom:10px;overflow:hidden;
}
#portCvs{position:absolute;inset:0;width:100%;height:100%}
.empty{text-align:center;padding:50px 20px;color:var(вЂ“t3);font-size:13px;line-height:2}
.empty-ico{font-size:32px;margin-bottom:8px}
.up{color:var(вЂ“green)}.dn{color:var(вЂ“red)}

/* в”Ђв”Ђ BOTTOM NAV в”Ђв”Ђ */
#nav{
position:fixed;bottom:0;left:0;right:0;
max-width:430px;margin:0 auto;
background:var(вЂ“s1);border-top:1px solid var(вЂ“b1);
display:flex;height:56px;z-index:100;
padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
flex:1;display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:4px;
font-size:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
color:var(вЂ“t3);transition:color .12s;
border-top:2px solid transparent;min-height:44px;
}
.nb.on{color:var(вЂ“blue);border-top-color:var(вЂ“blue)}
.nb svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* в”Ђв”Ђ TOAST в”Ђв”Ђ */
#toast{
position:fixed;bottom:66px;left:50%;
transform:translateX(-50%) translateY(6px);
background:var(вЂ“s2);color:var(вЂ“t1);border:1px solid var(вЂ“b2);
padding:9px 16px;border-radius:100px;
font-size:11px;font-weight:700;font-family:var(вЂ“mono);
z-index:999;opacity:0;transition:all .2s;pointer-events:none;
white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Legend pills on chart */
#legend{
position:absolute;bottom:6px;left:10px;
display:flex;gap:8px;pointer-events:none;z-index:5;
}
.leg{font-size:8px;font-family:var(вЂ“mono);font-weight:600;
display:flex;align-items:center;gap:3px}
.leg-line{width:14px;height:2px;border-radius:1px;flex-shrink:0}
</style>

</head>
<body>

<!-- HEADER -->

<div id="hdr">
  <div id="logo">
    PAPERTRADE
    <div class="live-pill sim" id="pill"><span class="dot"></span><span id="pill-txt">SIM</span></div>
  </div>
  <div id="hdr-right">
    <div id="hdr-val">$25,000.00</div>
    <div id="hdr-pnl" class="up">+$0.00 (0.00%)</div>
  </div>
</div>

<!-- STOCK PICKER -->

<div id="picker"></div>

<!-- в•ђв•ђ CHART SCREEN в•ђв•ђ -->

<div id="chartScreen" class="screen">
  <div id="price-row">
    <div id="pr-left">
      <div id="pr-name">Apple Inc. В· AAPL</div>
      <div id="pr-price">$0.00</div>
    </div>
    <div id="pr-right">
      <div id="pr-chg" class="up">в–І $0.00</div>
      <div id="pr-pct" class="up">+0.00%</div>
    </div>
  </div>

  <div id="tf-row">
    <button class="tf-btn on" ontouchend="setTf(this,'1D');event.stopPropagation()" onclick="setTf(this,'1D')">1D</button>
    <button class="tf-btn" ontouchend="setTf(this,'5D');event.stopPropagation()" onclick="setTf(this,'5D')">5D</button>
    <button class="tf-btn" ontouchend="setTf(this,'1M');event.stopPropagation()" onclick="setTf(this,'1M')">1M</button>
    <div class="sep"></div>
    <button class="ind-btn on" id="maBtn" ontouchend="toggleInd('ma');event.stopPropagation()" onclick="toggleInd('ma')">MA</button>
    <button class="ind-btn on" id="volBtn" ontouchend="toggleInd('vol');event.stopPropagation()" onclick="toggleInd('vol')">VOL</button>
    <span id="vol-lbl"></span>
  </div>

  <div id="chart-wrap">
    <canvas id="cvs"></canvas>
    <div id="tip"></div>
    <div id="legend">
      <div class="leg"><div class="leg-line" style="background:var(--ma20)"></div>MA20</div>
      <div class="leg"><div class="leg-line" style="background:var(--ma50)"></div>MA50</div>
    </div>
  </div>

  <div id="trade">
    <div class="t-row1">
      <button class="side-btn buy on" id="buyBtn" ontouchend="setSide('buy');event.stopPropagation()" onclick="setSide('buy')">в–І BUY</button>
      <button class="side-btn sell" id="sellBtn" ontouchend="setSide('sell');event.stopPropagation()" onclick="setSide('sell')">в–ј SELL</button>
      <div class="cash-info">
        <div class="cash-lbl">Cash</div>
        <div class="cash-amt" id="cashAmt">$25,000</div>
      </div>
    </div>
    <div class="t-row2">
      <div class="qty-wrap">
        <div class="q-btn" ontouchend="adjQ(-1);event.preventDefault()" onclick="adjQ(-1)">в€’</div>
        <input id="qty" type="number" min="1" step="1" value="1" oninput="updCost()"/>
        <div class="q-btn" ontouchend="adjQ(1);event.preventDefault()" onclick="adjQ(1)">+</div>
      </div>
      <button class="exec buy" id="execBtn" ontouchend="placeOrder();event.stopPropagation()" onclick="placeOrder()">BUY</button>
    </div>
    <div class="t-row3">
      <div class="t-info">Est: <b id="estCost">$0.00</b></div>
      <div class="t-pos" id="posTag"></div>
    </div>
  </div>
</div>

<!-- в•ђв•ђ PORTFOLIO SCREEN в•ђв•ђ -->

<div id="portScreen" class="screen off"></div>

<!-- в•ђв•ђ HISTORY SCREEN в•ђв•ђ -->

<div id="histScreen" class="screen off"></div>

<!-- в•ђв•ђ STATS SCREEN в•ђв•ђ -->

<div id="statsScreen" class="screen off"></div>

<!-- BOTTOM NAV -->

<nav id="nav">
  <button class="nb on" id="nb-chart" ontouchend="goTab('chart');event.preventDefault()">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Trade
  </button>
  <button class="nb" id="nb-port" ontouchend="goTab('port');event.preventDefault()">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    Portfolio
  </button>
  <button class="nb" id="nb-hist" ontouchend="goTab('hist');event.preventDefault()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
    History
  </button>
  <button class="nb" id="nb-stats" ontouchend="goTab('stats');event.preventDefault()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </button>
</nav>

<div id="toast"></div>

<script>
'use strict';
// в•ђв•ђ CONFIG в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const START = 25000;
const STOCKS = [
  {sym:'AAPL', name:'Apple Inc.',       seed:213.50, vol:.018, drift:.00008},
  {sym:'TSLA', name:'Tesla Inc.',       seed:248.00, vol:.040, drift:.00015},
  {sym:'NVDA', name:'NVIDIA Corp.',     seed:875.00, vol:.038, drift:.00020},
  {sym:'MSFT', name:'Microsoft Corp.',  seed:415.00, vol:.016, drift:.00007},
  {sym:'AMZN', name:'Amazon.com Inc.',  seed:195.00, vol:.022, drift:.00010},
  {sym:'META', name:'Meta Platforms',   seed:510.00, vol:.026, drift:.00012},
  {sym:'GOOGL',name:'Alphabet Inc.',    seed:175.00, vol:.019, drift:.00008},
  {sym:'JPM',  name:'JPMorgan Chase',   seed:198.00, vol:.014, drift:.00005},
  {sym:'SPY',  name:'S&P 500 ETF',      seed:512.00, vol:.010, drift:.00006},
  {sym:'GME',  name:'GameStop Corp.',   seed:18.50,  vol:.072, drift:-.00010},
];

// в•ђв•ђ STATE в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
let bal = START, port = {}, txs = [], sel = 'AAPL';
let curTab = 'chart', side = 'buy', tf = '1D';
let showMA = true, showVol = true;
let D = {};        // market data
let portHist = [START];
let crossIdx = -1;
let rafPending = false;

// в•ђв•ђ PRICE ENGINE вЂ” realistic mean-reverting GBM в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// Uses Box-Muller for proper normal distribution
function randn() {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  do { v = Math.random(); } while (v === 0);
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function nextClose(price, vol, drift, fair) {
  // Mean reversion: gently pulls toward fair value
  const rev = 0.006 * Math.log(fair / Math.max(price, 0.01));
  const shock = vol * 0.016 * randn();
  return Math.max(price * 0.6, price * Math.exp(drift + rev + shock));
}

function buildCandles(seed, vol, drift, n = 390) {
  const fair = seed;
  let p = seed * (0.94 + Math.random() * 0.12);
  const now = Date.now();
  const cs = [];
  for (let i = n; i >= 0; i--) {
    const o = +p.toFixed(2);
    // 4 micro-steps per bar for realistic intrabar moves
    for (let j = 0; j < 4; j++) {
      p = nextClose(p, vol, drift / 4, fair);
    }
    const c = +p.toFixed(2);
    // High/Low: simulate intrabar extremes
    const intraVol = vol * Math.abs(o) * (0.25 + Math.random() * 0.55);
    const h = +(Math.max(o, c) + intraVol * Math.random() * 0.5).toFixed(2);
    const l = +(Math.min(o, c) - intraVol * Math.random() * 0.5).toFixed(2);
    const v = Math.floor(2e5 + Math.random() * 3e6);
    cs.push({ t: now - i * 61000, o, h: Math.max(h, o, c), l: Math.min(l, o, c), c, v });
  }
  return cs;
}

STOCKS.forEach(s => {
  D[s.sym] = { ...s, candles: buildCandles(s.seed, s.vol, s.drift), live: false };
});

// в•ђв•ђ LIVE DATA в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
async function fetchLive(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`;
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(9000) });
    if (!r.ok) return null;
    const j = await r.json();
    const res = JSON.parse(j.contents)?.chart?.result?.[0];
    if (!res) return null;
    const q = res.indicators.quote[0];
    const cs = res.timestamp.map((t, i) => ({
      t: t * 1000,
      o: +(q.open[i]  || 0).toFixed(2),
      h: +(q.high[i]  || 0).toFixed(2),
      l: +(q.low[i]   || 0).toFixed(2),
      c: +(q.close[i] || 0).toFixed(2),
      v:   q.volume[i]|| 0,
    })).filter(c => c.c > 0.01);
    return cs.length > 10 ? cs : null;
  } catch { return null; }
}

(async () => {
  try {
    const res = await Promise.all(STOCKS.map(s => fetchLive(s.sym).then(c => ({ sym: s.sym, c }))));
    let any = false;
    res.forEach(({ sym, c }) => {
      if (c) { D[sym].candles = c; D[sym].live = true; any = true; }
    });
    const pill = $('pill'), pt = $('pill-txt');
    if (any) { pill.className = 'live-pill live'; pt.textContent = 'LIVE'; }
    else      { pill.className = 'live-pill sim';  pt.textContent = 'SIM';  }
  } catch { /* stay sim */ }
  buildPicker();
  refreshPriceRow();
  schedDraw();
})();

// в•ђв•ђ TICK в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
setInterval(() => {
  STOCKS.forEach(s => {
    const d = D[s.sym], cs = d.candles, last = cs[cs.length - 1];
    const nc = +nextClose(last.c, d.vol, d.drift, d.seed).toFixed(2);
    cs[cs.length - 1] = {
      ...last, c: nc,
      h: +Math.max(last.h, nc).toFixed(2),
      l: +Math.min(last.l, nc).toFixed(2),
    };
    // New bar every minute
    if (Date.now() - last.t > 61000) {
      cs.push({ t: Date.now(), o: last.c, h: nc, l: nc, c: nc, v: Math.floor(2e5 + Math.random() * 2.5e6) });
      if (cs.length > 800) cs.shift();
    }
  });
  portHist.push(+(bal + portVal()).toFixed(2));
  if (portHist.length > 600) portHist.shift();

  hdrUpdate();
  pickerUpdate();
  if (curTab === 'chart') { refreshPriceRow(); updCost(); updatePosTag(); schedDraw(); }
  else if (curTab === 'port') { /* live update positions handled by canvas */ drawPortChart(); }
}, 3000);

// в•ђв•ђ HELPERS в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const $ = id => document.getElementById(id);
function fmt(n, d = 2) { return Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function portVal() { return Object.entries(port).reduce((s, [sym, p]) => s + p.shares * D[sym].candles.at(-1).c, 0); }
function totalVal() { return +(bal + portVal()).toFixed(2); }
function toast(msg) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2400);
}
function calcMA(cs, p) {
  return cs.map((_, i) => i < p - 1 ? null : cs.slice(i - p + 1, i + 1).reduce((s, c) => s + c.c, 0) / p);
}
function slice() {
  const all = D[sel].candles;
  const n = tf === '1D' ? Math.min(195, all.length)
          : tf === '5D' ? Math.min(100, all.length)
          : all.length;
  return all.slice(-n);
}

// в•ђв•ђ HEADER в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function hdrUpdate() {
  const tv = totalVal(), pnl = +(tv - START).toFixed(2);
  $('hdr-val').textContent = '$' + fmt(tv);
  const el = $('hdr-pnl');
  el.textContent = (pnl >= 0 ? '+' : '') + fmt(pnl) + ' (' + ((pnl / START) * 100).toFixed(2) + '%)';
  el.className = pnl >= 0 ? 'up' : 'dn';
  $('cashAmt').textContent = '$' + fmt(bal, 0);
}

// в•ђв•ђ PICKER в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function buildPicker() {
  $('picker').innerHTML = STOCKS.map(s => {
    const l = D[s.sym].candles.at(-1), p = D[s.sym].candles.at(-2) || l;
    const chg = (l.c - p.c) / p.c * 100, up = chg >= 0;
    return `<div class="chip${s.sym === sel ? ' on' : ''}" data-sym="${s.sym}"
      ontouchend="pickStock('${s.sym}');event.preventDefault()"
      onclick="pickStock('${s.sym}')">
      <div class="chip-sym">${s.sym}</div>
      <div class="chip-price">$${l.c.toFixed(l.c >= 100 ? 1 : 2)}</div>
      <div class="chip-chg ${up ? 'up' : 'dn'}">${up ? '+' : ''}${chg.toFixed(1)}%</div>
    </div>`;
  }).join('');
}
function pickerUpdate() {
  document.querySelectorAll('.chip').forEach(el => {
    const sym = el.dataset.sym; if (!sym) return;
    const l = D[sym].candles.at(-1), p2 = D[sym].candles.at(-2) || l;
    const chg = (l.c - p2.c) / p2.c * 100, up = chg >= 0;
    el.querySelector('.chip-price').textContent = '$' + l.c.toFixed(l.c >= 100 ? 1 : 2);
    const cc = el.querySelector('.chip-chg');
    cc.textContent = (up ? '+' : '') + chg.toFixed(1) + '%';
    cc.className = 'chip-chg ' + (up ? 'up' : 'dn');
  });
}
function pickStock(sym) {
  sel = sym;
  document.querySelectorAll('.chip').forEach(e => e.classList.toggle('on', e.dataset.sym === sym));
  crossIdx = -1;
  refreshPriceRow();
  schedDraw();
  updCost();
  updatePosTag();
  if (curTab !== 'chart') goTab('chart');
}

// в•ђв•ђ PRICE ROW в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function refreshPriceRow() {
  const d = D[sel], cs = d.candles;
  const last = cs.at(-1), prev = cs.at(-2) || last;
  const chg = +(last.c - prev.c).toFixed(2), pct = +((chg / prev.c) * 100).toFixed(2), up = chg >= 0;
  $('pr-name').textContent = d.name + ' В· ' + sel;
  $('pr-price').textContent = '$' + last.c.toFixed(2);
  const chgEl = $('pr-chg');
  chgEl.textContent = (up ? 'в–І' : 'в–ј') + ' $' + Math.abs(chg).toFixed(2);
  chgEl.className = up ? 'up' : 'dn';
  const pctEl = $('pr-pct');
  pctEl.textContent = (up ? '+' : '') + pct + '%';
  pctEl.className = up ? 'up' : 'dn';
  $('vol-lbl').textContent = 'Vol ' + (last.v / 1e6).toFixed(1) + 'M';
}

// в•ђв•ђ TAB NAV в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function goTab(t) {
  curTab = t;
  ['chart','port','hist','stats'].forEach(k => {
    $('nb-' + k).classList.toggle('on', k === t);
    const scr = $(k === 'chart' ? 'chartScreen' : k + 'Screen');
    if (scr) scr.classList.toggle('off', k !== t);
  });
  if (t === 'port')  renderPort();
  else if (t === 'hist')  renderHist();
  else if (t === 'stats') renderStats();
  else schedDraw();
}

// в•ђв•ђ TF / INDICATORS в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function setTf(btn, t) {
  tf = t;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  crossIdx = -1;
  schedDraw();
}
function toggleInd(which) {
  if (which === 'ma') {
    showMA = !showMA;
    $('maBtn').classList.toggle('on', showMA);
    $('legend').style.display = showMA ? 'flex' : 'none';
  } else {
    showVol = !showVol;
    $('volBtn').classList.toggle('on', showVol);
  }
  schedDraw();
}

// в•ђв•ђ DRAW вЂ” RAF throttled в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function schedDraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; draw(); });
}

function draw() {
  const canvas = $('cvs'); if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;

  const tw = Math.round(W * dpr), th = Math.round(H * dpr);
  if (canvas.width !== tw || canvas.height !== th) { canvas.width = tw; canvas.height = th; }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cs = slice(); if (cs.length < 2) return;

  // в”Ђв”Ђ Layout в”Ђв”Ђ
  const VOL_H = showVol ? Math.round(H * 0.18) : 0;
  const PAD_L = 4, PAD_R = 60, PAD_T = 6, PAD_B = 4;
  const CANDLE_AREA_H = H - PAD_T - PAD_B - VOL_H - (showVol ? 6 : 0);
  const volTop = PAD_T + CANDLE_AREA_H + 6;

  // в”Ђв”Ђ Price scale в”Ђв”Ђ
  const hiP = Math.max(...cs.map(c => c.h));
  const loP = Math.min(...cs.map(c => c.l));
  const pad = (hiP - loP) * 0.08;
  const priceHi = hiP + pad, priceLo = Math.max(0.01, loP - pad);
  const priceRange = priceHi - priceLo;
  const toY = p => PAD_T + CANDLE_AREA_H - ((p - priceLo) / priceRange) * CANDLE_AREA_H;

  // Column geometry
  const cW = (W - PAD_L - PAD_R) / cs.length;
  const bW = Math.max(1.5, Math.min(cW - 1, 8));

  // в”Ђв”Ђ Clear в”Ђв”Ђ
  ctx.fillStyle = '#131722';
  ctx.fillRect(0, 0, W, H);

  // в”Ђв”Ђ Grid lines + price labels в”Ђв”Ђ
  ctx.font = '9px Roboto Mono, monospace';
  ctx.textAlign = 'left';
  const gridCount = 5;
  for (let i = 0; i <= gridCount; i++) {
    const prc = priceLo + (priceRange / gridCount) * i;
    const y = toY(prc);
    // Subtle horizontal gridline
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    // Price label
    ctx.fillStyle = '#4c505b';
    ctx.fillText(prc >= 100 ? '$' + prc.toFixed(0) : '$' + prc.toFixed(2), W - PAD_R + 5, y + 3);
  }

  // в”Ђв”Ђ Time labels в”Ђв”Ђ
  const step = Math.max(1, Math.floor(cs.length / 4));
  ctx.fillStyle = '#4c505b'; ctx.font = '8px Roboto Mono, monospace';
  for (let i = 0; i < cs.length; i += step) {
    const x = PAD_L + (i + 0.5) * cW;
    const d = new Date(cs[i].t);
    const lbl = tf === '1M'
      ? d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
      : d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    ctx.fillText(lbl, x - 12, H - (showVol ? VOL_H + 3 : 2));
  }

  // в”Ђв”Ђ Volume bars в”Ђв”Ђ
  if (showVol && VOL_H > 0) {
    const maxV = Math.max(...cs.map(c => c.v)) || 1;
    ctx.fillStyle = '#4c505b'; ctx.font = '8px Roboto Mono, monospace';
    ctx.fillText('VOL', W - PAD_R + 5, volTop + 10);
    cs.forEach((c, i) => {
      const x = PAD_L + i * cW;
      const up = c.c >= c.o;
      const vh = Math.max(1, (c.v / maxV) * (VOL_H - 6));
      ctx.fillStyle = up ? 'rgba(38,166,154,.5)' : 'rgba(239,83,80,.5)';
      ctx.fillRect(x + 0.5, volTop + (VOL_H - 6) - vh, Math.max(1, bW), vh);
    });
  }

  // в”Ђв”Ђ MA lines в”Ђв”Ђ
  if (showMA && cs.length >= 20) {
    const drawLine = (vals, color, width) => {
      ctx.beginPath();
      let started = false;
      vals.forEach((v, i) => {
        if (v === null) return;
        const x = PAD_L + (i + 0.5) * cW, y = toY(v);
        started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true);
      });
      ctx.strokeStyle = color; ctx.lineWidth = width;
      ctx.setLineDash([]); ctx.stroke();
    };
    drawLine(calcMA(cs, Math.min(50, cs.length)), 'rgba(249,168,37,.75)', 1.2);
    drawLine(calcMA(cs, 20), 'rgba(41,98,255,.9)', 1.2);
  }

  // в”Ђв”Ђ Candlesticks в”Ђв”Ђ
  cs.forEach((c, i) => {
    const x = PAD_L + (i + 0.5) * cW;
    const up = c.c >= c.o;
    const green = '#26a69a', red = '#ef5350';
    const col = up ? green : red;

    // Wick (thin centered line from low to high)
    const wickW = Math.max(0.8, bW * 0.12);
    ctx.fillStyle = col;
    const wickTop = toY(c.h), wickBot = toY(c.l);
    ctx.fillRect(x - wickW / 2, wickTop, wickW, Math.max(1, wickBot - wickTop));

    // Body
    const bodyTop = toY(Math.max(c.o, c.c));
    const bodyBot = toY(Math.min(c.o, c.c));
    const bodyH = Math.max(1.5, bodyBot - bodyTop);

    if (bW >= 2) {
      ctx.fillStyle = col;
      ctx.fillRect(x - bW / 2, bodyTop, bW, bodyH);
    } else {
      ctx.fillStyle = col;
      ctx.fillRect(x - 0.75, bodyTop, 1.5, bodyH);
    }
  });

  // в”Ђв”Ђ Crosshair vertical line в”Ђв”Ђ
  if (crossIdx >= 0 && crossIdx < cs.length) {
    const x = PAD_L + (crossIdx + 0.5) * cW;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, PAD_T + CANDLE_AREA_H); ctx.stroke();
    ctx.setLineDash([]);
  }

  // в”Ђв”Ђ Last price dashed line в”Ђв”Ђ
  const last = cs.at(-1);
  const lastY = toY(last.c);
  const dayUp = last.c >= cs[0].c;
  ctx.strokeStyle = dayUp ? 'rgba(38,166,154,.5)' : 'rgba(239,83,80,.5)';
  ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(PAD_L, lastY); ctx.lineTo(W - PAD_R, lastY); ctx.stroke();
  ctx.setLineDash([]);

  // в”Ђв”Ђ Price pill в”Ђв”Ђ
  const tagW = 54, tagH = 16;
  ctx.fillStyle = dayUp ? '#26a69a' : '#ef5350';
  ctx.beginPath();
  ctx.roundRect(W - PAD_R + 3, lastY - tagH / 2, tagW, tagH, 3);
  ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Roboto Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('$' + last.c.toFixed(2), W - PAD_R + 7, lastY + 4);
}

// в•ђв•ђ CROSSHAIR TOUCH в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const chartWrap = $('chart-wrap');
function handlePointer(clientX) {
  const rect = $('cvs').getBoundingClientRect();
  const cs = slice();
  const cW = (rect.width - 4 - 60) / cs.length;
  const x = clientX - rect.left - 4;
  const idx = Math.max(0, Math.min(cs.length - 1, Math.floor(x / cW)));
  crossIdx = idx;
  const c = cs[idx], up = c.c >= c.o;
  const d = new Date(c.t);
  const lbl = tf === '1M'
    ? d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
    : d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
  const tip = $('tip');
  tip.innerHTML = `<span style="color:var(--t3)">${lbl}</span>
    &nbsp; O:<b>$${c.o.toFixed(2)}</b>
    &nbsp; H:<b style="color:var(--green)">$${c.h.toFixed(2)}</b>
    &nbsp; L:<b style="color:var(--red)">$${c.l.toFixed(2)}</b>
    &nbsp; C:<b style="color:${up?'var(--green)':'var(--red)'}">$${c.c.toFixed(2)}</b>`;
  tip.style.display = 'block';
  schedDraw();
}
function clearCrosshair() {
  crossIdx = -1;
  $('tip').style.display = 'none';
  schedDraw();
}
chartWrap.addEventListener('touchmove', e => { e.preventDefault(); handlePointer(e.touches[0].clientX); }, { passive: false });
chartWrap.addEventListener('touchend', clearCrosshair);
chartWrap.addEventListener('mousemove', e => handlePointer(e.clientX));
chartWrap.addEventListener('mouseleave', clearCrosshair);

// в•ђв•ђ TRADE PANEL в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function setSide(s) {
  side = s;
  $('buyBtn').className  = 'side-btn buy'  + (s === 'buy'  ? ' on' : '');
  $('sellBtn').className = 'side-btn sell' + (s === 'sell' ? ' on' : '');
  $('execBtn').textContent = s === 'buy' ? 'BUY' : 'SELL';
  $('execBtn').className = 'exec ' + s;
  updCost();
}
function adjQ(d) {
  const el = $('qty');
  el.value = Math.max(1, (parseInt(el.value) || 1) + d);
  updCost();
}
function updCost() {
  const q = parseFloat($('qty')?.value) || 0;
  const p = D[sel].candles.at(-1).c;
  $('estCost').textContent = '$' + (q * p).toFixed(2);
}
function updatePosTag() {
  const pos = port[sel], el = $('posTag');
  if (!el) return;
  if (pos) {
    const cp = D[sel].candles.at(-1).c;
    const pnl = +((cp - pos.avg) * pos.shares).toFixed(2), up = pnl >= 0;
    el.textContent = pos.shares + ' sh В· ' + (up ? '+' : '') + '$' + pnl.toFixed(2);
    el.className = 't-pos ' + (up ? 'up' : 'dn');
  } else { el.textContent = ''; }
}
function placeOrder() {
  const q = parseFloat($('qty').value) || 0;
  if (q <= 0) { toast('вљ  Enter a quantity'); return; }
  const cp = D[sel].candles.at(-1).c;
  const total = +(q * cp).toFixed(2);
  if (side === 'buy') {
    if (total > bal) { toast('вљ  Insufficient funds'); return; }
    bal = +(bal - total).toFixed(2);
    const ex = port[sel] || { shares: 0, avg: 0 };
    const ns = +(ex.shares + q).toFixed(4);
    port[sel] = { shares: ns, avg: +((ex.shares * ex.avg + total) / ns).toFixed(2) };
    toast('вњ“ Bought ' + q + ' ' + sel + ' @ $' + cp.toFixed(2));
  } else {
    if (!port[sel] || port[sel].shares < q) { toast('вљ  Not enough shares'); return; }
    bal = +(bal + total).toFixed(2);
    const ns = +(port[sel].shares - q).toFixed(4);
    if (ns < 0.001) delete port[sel]; else port[sel] = { ...port[sel], shares: ns };
    toast('вњ“ Sold ' + q + ' ' + sel + ' @ $' + cp.toFixed(2));
  }
  txs.unshift({ t: Date.now(), sym: sel, side, shares: q, price: cp, total });
  if (txs.length > 300) txs.pop();
  hdrUpdate(); updatePosTag();
}

// в•ђв•ђ PORTFOLIO в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function renderPort() {
  const pv = portVal(), tv = totalVal(), pnl = +(tv - START).toFixed(2), up = pnl >= 0;
  $('portScreen').innerHTML = `
    <div class="sec">Account</div>
    <div class="card">
      ${[['Starting Balance','$'+fmt(START)],['Cash','$'+fmt(bal)],['Holdings','$'+pv.toFixed(2)],['Total','$'+fmt(tv)]].map(([k,v])=>`
        <div class="row"><span class="rk">${k}</span><span class="rv">${v}</span></div>`).join('')}
      <div class="pnl-badge" style="background:${up?'var(--gdim)':'var(--rdim)'};color:${up?'var(--green)':'var(--red)'}">
        P&L ${up?'в–І':'в–ј'} ${up?'+':''}$${fmt(pnl)} &nbsp;В·&nbsp; ${((pnl/START)*100).toFixed(2)}%
      </div>
    </div>
    ${portHist.length > 4 ? `
    <div class="sec">Portfolio Value</div>
    <div class="pchart"><canvas id="portCvs"></canvas></div>` : ''}
    <div class="sec">Positions (${Object.keys(port).length})</div>
    ${!Object.keys(port).length
      ? '<div class="empty"><div class="empty-ico">рџ“€</div>No open positions.<br>Go to Trade to get started.</div>'
      : Object.entries(port).map(([sym, p]) => {
          const cp = D[sym].candles.at(-1).c;
          const pv2 = +(cp * p.shares).toFixed(2);
          const pp = +((cp - p.avg) * p.shares).toFixed(2), pu = pp >= 0;
          const ppp = (((cp - p.avg) / p.avg) * 100).toFixed(2);
          return `<div class="pos-card ${pu?'up':'dn'}" onclick="pickStock('${sym}')">
            <div class="pc-top">
              <div><div class="pc-sym">${sym}</div><div class="pc-sh">${p.shares} shares В· avg $${p.avg}</div></div>
              <div><div class="pc-val">$${fmt(pv2)}</div>
                <div class="pc-pnl ${pu?'up':'dn'}">${pu?'+':''}$${fmt(pp)} (${pu?'+':''}${ppp}%)</div>
              </div>
            </div>
            <div class="pc-sub">Now $${cp.toFixed(2)} В· Cost $${(p.shares*p.avg).toFixed(2)}</div>
          </div>`;
        }).join('')}
  `;
  setTimeout(drawPortChart, 30);
}

function drawPortChart() {
  const c = $('portCvs'); if (!c) return;
  const dpr = window.devicePixelRatio || 1;
  const W = c.offsetWidth, H = c.offsetHeight; if (!W || !H) return;
  c.width = Math.round(W * dpr); c.height = Math.round(H * dpr);
  const ctx = c.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const vals = portHist; if (vals.length < 2) return;
  const hi = Math.max(...vals) * 1.01, lo = Math.min(...vals) * 0.99, rng = hi - lo || 1;
  const toX = i => (i / (vals.length - 1)) * W;
  const toY = v => H - ((v - lo) / rng) * H * 0.9 - H * 0.05;
  const up = vals.at(-1) >= vals[0];
  ctx.fillStyle = '#1e222d'; ctx.fillRect(0, 0, W, H);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, up ? 'rgba(38,166,154,.2)' : 'rgba(239,83,80,.2)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.moveTo(toX(0), toY(vals[0]));
  vals.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
  ctx.lineTo(toX(vals.length - 1), H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(toX(0), toY(vals[0]));
  vals.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
  ctx.strokeStyle = up ? '#26a69a' : '#ef5350'; ctx.lineWidth = 2; ctx.stroke();
}

// в•ђв•ђ HISTORY в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  const bought = txs.filter(t => t.side === 'buy').reduce((s, t) => s + t.total, 0);

    ${!txs.length

      : txs.map(tx => {

                     d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
          return `<div class="tx" onclick="pickStock('${tx.sym}')">

            <div style="text-align:center">
              <div class="badge ${tx.side}">${tx.side.toUpperCase()}</div>

            <div><div class="tx-amt">$${fmt(tx.total)}</div><div class="tx-at">@ $${tx.price.toFixed(2)}</div></div>

// в•ђв•ђ STATS в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function renderStats() {
  const pv = portVal(), tv = totalVal(), pnl = +(tv - START).toFixed(2);
  const sells = txs.filter(t => t.side === 'sell');
  const wins = sells.filter(t => {
    const b = txs.find(x => x.sym === t.sym && x.side === 'buy' && x.t < t.t);
    return b ? t.price > b.price : false;
  });
  const wr = sells.length ? Math.round(wins.length / sells.length * 100) : 0;
  const best = sells.reduce((b, t) => {
    const bx = txs.find(x => x.sym === t.sym && x.side === 'buy' && x.t < t.t);
    const p = bx ? (t.price - bx.price) * t.shares : 0;
    return p > b.p ? { sym: t.sym, p } : b;
  }, { sym: 'вЂ”', p: 0 });

  $('statsScreen').innerHTML = `
    <div class="sec">Performance</div>
    <div class="g3">
      <div class="sbox"><div class="slbl">Return</div><div class="sval ${pnl>=0?'up':'dn'}" style="font-size:14px">${pnl>=0?'+':''}${((pnl/START)*100).toFixed(1)}%</div></div>
      <div class="sbox"><div class="slbl">P&L</div><div class="sval ${pnl>=0?'up':'dn'}" style="font-size:12px">${pnl>=0?'+':''}$${fmt(pnl)}</div></div>
      <div class="sbox"><div class="slbl">Win Rate</div><div class="sval ${wr>=50?'up':'dn'}">${wr}%</div></div>
    </div>
    <div class="g3">
      <div class="sbox"><div class="slbl">Trades</div><div class="sval">${txs.length}</div></div>
      <div class="sbox"><div class="slbl">Positions</div><div class="sval">${Object.keys(port).length}</div></div>
      <div class="sbox"><div class="slbl">Cash</div><div class="sval" style="font-size:12px">$${(bal/1000).toFixed(1)}k</div></div>
    </div>
    <div class="sec">Best Trade</div>
    <div class="card">
      <div class="row"><span class="rk">Symbol</span><span class="rv">${best.sym}</span></div>
      <div class="row"><span class="rk">Profit</span><span class="rv ${best.p>=0?'up':'dn'}">${best.p>=0?'+':''}$${best.p.toFixed(2)}</span></div>
    </div>
    <div class="sec">Watchlist</div>
    ${STOCKS.map(s => {
      const l = D[s.sym].candles.at(-1), p2 = D[s.sym].candles.at(-2) || l;
      const dc = (l.c - p2.c) / p2.c * 100, up = dc >= 0;
      const pos = port[s.sym];
      const posPnl = pos ? (l.c - pos.avg) * pos.shares : null;
      return `<div class="wl" onclick="pickStock('${s.sym}')">
        <div><div class="wl-sym">${s.sym}</div><div class="wl-name">${s.name}</div></div>
        <div style="text-align:center">
          <div style="font-family:var(--mono);font-weight:700;font-size:13px">$${l.c.toFixed(2)}</div>
          <div class="${up?'up':'dn'}" style="font-family:var(--mono);font-size:10px;font-weight:700">${up?'+':''}${dc.toFixed(2)}%</div>
        </div>
        <div style="text-align:right;min-width:64px">
          ${posPnl !== null
            ? `<div class="${posPnl>=0?'up':'dn'}" style="font-family:var(--mono);font-weight:700;font-size:12px">${posPnl>=0?'+':''}$${posPnl.toFixed(2)}</div>
               <div style="font-size:9px;color:var(--t3);font-family:var(--mono)">${pos.shares}sh</div>`
            : `<div style="font-size:11px;color:var(--t3)">вЂ”</div>`}
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:16px;text-align:center">
      <button onclick="if(confirm('Reset to $25,000?')){bal=START;port={};txs=[];portHist=[START];hdrUpdate();toast('вњ“ Account reset');}"
        style="padding:10px 22px;background:var(--s2);border:1px solid var(--b1);border-radius:100px;
          font-size:11px;font-weight:700;color:var(--t3);font-family:var(--mono)">
        в†є &nbsp;Reset Account
      </button>
    </div>
  `;
}
