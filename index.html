<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>PaperTrade Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#0a0a0f;
  --s1:#111117;
  --s2:#18181f;
  --s3:#22222c;
  --b1:#2c2c3a;
  --b2:#383848;
  --t1:#f2f2f8;
  --t2:#8888aa;
  --t3:#44445a;
  --green:#26de81;
  --green2:#20c96b;
  --gdim:rgba(38,222,129,.12);
  --red:#fc5c7d;
  --red2:#e03060;
  --rdim:rgba(252,92,125,.12);
  --blue:#4b8eff;
  --gold:#ffc940;
  --purple:#b39ddb;
  --mono:'Roboto Mono',monospace;
  --ui:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--t1);font-family:var(--ui);
  max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100dvh}
button,input{font-family:inherit;outline:none;border:none}
button{cursor:pointer;background:none;color:inherit}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--b1)}

/* ── SCREENS ─────────────────────────────────────────────── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;
background:var(–bg);transition:opacity .2s,transform .2s;
max-width:430px;margin:0 auto;}
.screen.off{opacity:0;pointer-events:none;transform:translateY(8px)}

/* ── TOP BAR ─────────────────────────────────────────────── */
#topbar{
background:var(–s1);border-bottom:1px solid var(–b1);
padding:10px 16px 8px;flex-shrink:0;
display:flex;justify-content:space-between;align-items:center;
z-index:10;
}
#tb-left{display:flex;align-items:center;gap:8px}
#tb-logo{font-family:var(–mono);font-weight:700;font-size:13px;color:var(–t1);letter-spacing:-.2px}
.live-pill{
display:flex;align-items:center;gap:4px;
padding:2px 7px;border-radius:20px;font-size:8px;font-weight:700;
letter-spacing:.8px;text-transform:uppercase;font-family:var(–mono);
}
.live-pill.live{background:var(–gdim);color:var(–green)}
.live-pill.sim{background:rgba(255,201,64,.1);color:var(–gold)}
.live-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#tb-right{text-align:right}
#tb-total{font-family:var(–mono);font-weight:700;font-size:16px;letter-spacing:-.5px}
#tb-pnl{font-family:var(–mono);font-size:10px;font-weight:600;margin-top:1px}

/* ── STOCK SELECTOR ROW ──────────────────────────────────── */
#stockRow{
background:var(–s1);border-bottom:1px solid var(–b1);
display:flex;overflow-x:auto;flex-shrink:0;
-webkit-overflow-scrolling:touch;
}
#stockRow::-webkit-scrollbar{display:none}
.stk{
flex-shrink:0;padding:8px 12px;cursor:pointer;
border-bottom:2px solid transparent;min-width:64px;text-align:center;
transition:background .12s;
/* Increased touch target */
min-height:44px;display:flex;flex-direction:column;justify-content:center;
}
.stk.on{background:rgba(75,142,255,.07);border-bottom-color:var(–blue)}
.stk-sym{font-size:11px;font-weight:700;color:var(–t2);letter-spacing:.2px}
.stk.on .stk-sym{color:var(–blue)}
.stk-price{font-size:9px;color:var(–t3);font-family:var(–mono);margin:2px 0}
.stk-chg{font-size:9px;font-weight:600;font-family:var(–mono)}
.up{color:var(–green)}.dn{color:var(–red)}

/* ── CHART SCREEN ────────────────────────────────────────── */
#chartScreen{top:0;left:0;right:0;bottom:56px;display:flex;flex-direction:column}

/* Price header */
#priceBar{
padding:10px 16px 6px;flex-shrink:0;
display:flex;justify-content:space-between;align-items:center;
}
#pb-left{}
#pb-sym{font-size:11px;color:var(–t3);font-weight:600;letter-spacing:.3px;margin-bottom:4px}
#pb-price{font-family:var(–mono);font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
#pb-right{text-align:right}
#pb-chg{font-family:var(–mono);font-size:15px;font-weight:700}
#pb-pct{font-family:var(–mono);font-size:12px;font-weight:600;margin-top:2px}
#pb-label{font-size:9px;color:var(–t3);margin-top:3px}

/* TF row */
#tfbar{
padding:0 16px 6px;display:flex;gap:5px;align-items:center;flex-shrink:0;
}
.tfb{
padding:4px 11px;font-size:10px;font-weight:700;border-radius:100px;
background:var(–s2);color:var(–t3);border:1px solid var(–b1);
font-family:var(–mono);transition:all .12s;
}
.tfb.on{background:var(–blue);color:#fff;border-color:var(–blue)}
.ind-toggle{
padding:4px 9px;font-size:10px;font-weight:700;border-radius:100px;
background:var(–s2);color:var(–t3);border:1px solid var(–b1);
font-family:var(–mono);transition:all .12s;
}
.ind-toggle.on{background:var(–s3);color:var(–gold);border-color:var(–gold)}
#tf-vol{margin-left:auto;font-size:9px;color:var(–t3);font-family:var(–mono)}

/* Chart canvas container */
#chartBox{
flex:1;min-height:0;position:relative;
padding:0 0 0 0;
overflow:hidden;
}
#mainCvs{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

/* OHLC overlay bar */
#ohlcBar{
position:absolute;top:4px;left:8px;right:8px;
display:flex;gap:10px;pointer-events:none;z-index:5;
}
.ob{font-size:9px;font-family:var(–mono);font-weight:600}
.ob span{color:var(–t3)}

/* Tooltip */
#tip{
position:absolute;top:6px;left:8px;right:8px;
background:rgba(17,17,23,.92);border:1px solid var(–b2);
border-radius:6px;padding:5px 10px;
font-size:10px;font-family:var(–mono);color:var(–t2);
pointer-events:none;display:none;white-space:nowrap;
backdrop-filter:blur(4px);z-index:10;line-height:1.8;
}

/* ── TRADE PANEL (slide up from bottom of chart screen) ─── */
#tradePanel{
background:var(–s1);border-top:1px solid var(–b1);
flex-shrink:0;padding:10px 14px 8px;
padding-bottom:max(8px,env(safe-area-inset-bottom,0px));
}
.tp-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.side-btn{
padding:8px 0;flex:1;font-weight:800;font-size:12px;letter-spacing:.5px;
border-radius:7px;background:var(–s2);color:var(–t3);
border:1px solid var(–b1);transition:all .15s;
}
.side-btn.buy.on{background:var(–green2);color:#fff;border-color:var(–green2);
box-shadow:0 2px 12px rgba(38,222,129,.2)}
.side-btn.sell.on{background:var(–red2);color:#fff;border-color:var(–red2);
box-shadow:0 2px 12px rgba(252,92,125,.2)}
.cash-box{margin-left:auto;text-align:right;flex-shrink:0}
.cash-lbl{font-size:8px;color:var(–t3);font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.cash-val{font-family:var(–mono);font-size:12px;font-weight:700;color:var(–t2)}
.tp-mid{display:flex;gap:8px;align-items:stretch}
.qty-box{
display:flex;align-items:stretch;background:var(–s2);
border:1.5px solid var(–b1);border-radius:8px;overflow:hidden;flex:1;
}
.qty-box:focus-within{border-color:var(–blue)}
.qa{
width:38px;background:var(–s3);color:var(–t2);font-size:20px;font-weight:300;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
/* Big touch targets */
min-height:44px;
transition:background .1s;
}
.qa:active{background:var(–b1)}
#qInp{
flex:1;padding:6px 4px;background:transparent;border:none;
color:var(–t1);font-family:var(–mono);font-size:18px;font-weight:700;
text-align:center;min-width:0;
}
.exec-btn{
padding:0 18px;font-size:14px;font-weight:800;border-radius:8px;
color:#fff;letter-spacing:.2px;min-height:44px;flex-shrink:0;
transition:all .12s;
}
.exec-btn:active{transform:scale(.96)}
.exec-btn.buy{background:linear-gradient(160deg,var(–green),var(–green2));
box-shadow:0 2px 14px rgba(38,222,129,.25)}
.exec-btn.sell{background:linear-gradient(160deg,var(–red),var(–red2));
box-shadow:0 2px 14px rgba(252,92,125,.25)}
.tp-bot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.tp-info{font-size:10px;color:var(–t3);font-family:var(–mono)}
.tp-info span{color:var(–t2);font-weight:700}
.pos-tag{font-size:10px;font-family:var(–mono);font-weight:700}

/* ── PORTFOLIO SCREEN ─────────────────────────────────────── */
#portScreen{
top:0;left:0;right:0;bottom:56px;
overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:12px 14px 12px;
}
/* ── HISTORY SCREEN ───────────────────────────────────────── */
#histScreen{
top:0;left:0;right:0;bottom:56px;
overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:12px 14px 12px;
}
/* ── STATS SCREEN ─────────────────────────────────────────── */
#statsScreen{
top:0;left:0;right:0;bottom:56px;
overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:12px 14px 12px;
}

/* ── REUSABLE COMPONENTS ──────────────────────────────────── */
.sec{font-size:9px;color:var(–t3);font-weight:700;letter-spacing:1.2px;
text-transform:uppercase;margin:16px 0 8px;font-family:var(–mono)}
.sec:first-child{margin-top:0}
.card{background:var(–s1);border-radius:10px;border:1px solid var(–b1);
padding:14px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;padding:7px 0;
border-bottom:1px solid var(–b1);font-size:13px}
.row:last-child{border-bottom:none}
.rk{color:var(–t3)}.rv{font-family:var(–mono);font-weight:700;color:var(–t1)}
.pnl-big{
margin-top:10px;padding:11px;border-radius:8px;text-align:center;
font-family:var(–mono);font-weight:800;font-size:16px;letter-spacing:-.3px;
}
.pos-card{
background:var(–s1);border-radius:10px;border:1px solid var(–b1);
padding:13px 13px 11px 16px;margin-bottom:8px;
cursor:pointer;transition:background .12s;
position:relative;overflow:hidden;
}
.pos-card::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
.pos-card.up::before{background:var(–green)}
.pos-card.dn::before{background:var(–red)}
.pos-card:active{background:var(–s2)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.pc-sym{font-weight:800;font-size:17px}
.pc-sh{font-size:10px;color:var(–t3);margin-top:2px;font-family:var(–mono)}
.pc-val{font-family:var(–mono);font-weight:700;font-size:14px;text-align:right}
.pc-pnl{font-family:var(–mono);font-size:11px;font-weight:700;text-align:right}
.pc-sub{font-size:10px;color:var(–t3);font-family:var(–mono)}
.pchart-wrap{background:var(–s1);border-radius:10px;border:1px solid var(–b1);
padding:10px;margin-bottom:10px;height:110px;position:relative}
#portCvs{position:absolute;inset:10px;width:calc(100% - 20px);height:calc(100% - 20px)}
.tx-card{
background:var(–s1);border-radius:8px;border:1px solid var(–b1);
padding:11px 13px;margin-bottom:6px;
display:flex;justify-content:space-between;align-items:center;cursor:pointer;
transition:background .12s;
}
.tx-card:active{background:var(–s2)}
.tx-sym{font-weight:800;font-size:15px}
.tx-dt{font-size:9px;color:var(–t3);font-family:var(–mono);margin-top:2px}
.badge{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:800;
letter-spacing:.8px;text-transform:uppercase;font-family:var(–mono)}
.badge.buy{background:var(–gdim);color:var(–green)}
.badge.sell{background:var(–rdim);color:var(–red)}
.tx-sh{font-size:9px;color:var(–t3);font-family:var(–mono);text-align:center;margin-top:3px}
.tx-amt{font-family:var(–mono);font-weight:700;font-size:13px;text-align:right}
.tx-at{font-size:9px;color:var(–t3);font-family:var(–mono);text-align:right}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.sbox{background:var(–s1);border-radius:8px;border:1px solid var(–b1);
padding:11px 6px;text-align:center}
.sl{font-size:8px;color:var(–t3);font-weight:700;letter-spacing:1px;
text-transform:uppercase;font-family:var(–mono);margin-bottom:4px}
.sv{font-family:var(–mono);font-weight:700;font-size:18px}
.empty{text-align:center;padding:50px 20px;color:var(–t3);font-size:13px;line-height:2}
.empty-ico{font-size:34px;margin-bottom:10px}
.wl-card{background:var(–s1);border-radius:8px;border:1px solid var(–b1);
padding:12px 13px;margin-bottom:6px;display:flex;justify-content:space-between;
align-items:center;cursor:pointer;transition:background .12s}
.wl-card:active{background:var(–s2)}
.wl-sym{font-weight:800;font-size:15px}
.wl-name{font-size:10px;color:var(–t3);margin-top:1px}
.wl-price{font-family:var(–mono);font-weight:700;font-size:14px;text-align:right}
.wl-chg{font-family:var(–mono);font-size:10px;font-weight:700;text-align:right;margin-top:2px}
.wl-pos{font-size:10px;font-family:var(–mono);font-weight:700}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
#nav{
position:fixed;bottom:0;left:0;right:0;
max-width:430px;margin:0 auto;
background:var(–s1);border-top:1px solid var(–b1);
display:flex;height:56px;z-index:100;
padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
flex:1;display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:3px;
font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
color:var(–t3);transition:color .12s;
border-top:2px solid transparent;
/* Explicit big tap area */
min-height:44px;
/* Remove any margin/padding that could shrink tap area */
}
.nb.on{color:var(–blue);border-top-color:var(–blue)}
.nb svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;
fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── TOAST ───────────────────────────────────────────────── */
#toast{
position:fixed;bottom:66px;left:50%;
transform:translateX(-50%) translateY(8px);
background:var(–s2);color:var(–t1);border:1px solid var(–b2);
padding:9px 16px;border-radius:100px;font-size:12px;font-weight:700;
z-index:999;opacity:0;transition:all .22s;pointer-events:none;
font-family:var(–mono);white-space:nowrap;
box-shadow:0 4px 20px rgba(0,0,0,.6);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

</head>
<body>

<!-- TOP BAR — shared across all screens -->

<div id="topbar">
  <div id="tb-left">
    <div id="tb-logo">PAPERTRADE</div>
    <div class="live-pill sim" id="livePill"><span class="dot"></span><span id="pillText">SIM</span></div>
  </div>
  <div id="tb-right">
    <div id="tb-total">$25,000.00</div>
    <div id="tb-pnl" class="up">+$0.00 (0.00%)</div>
  </div>
</div>

<!-- STOCK SELECTOR — shared -->

<div id="stockRow"></div>

<!-- ══ CHART SCREEN ══ -->

<div id="chartScreen" class="screen">
  <div id="priceBar">
    <div id="pb-left">
      <div id="pb-sym">Apple Inc.</div>
      <div id="pb-price">$227.50</div>
    </div>
    <div id="pb-right">
      <div id="pb-chg" class="up">▲ $0.00</div>
      <div id="pb-pct" class="up">+0.00%</div>
      <div id="pb-label">Today</div>
    </div>
  </div>

  <div id="tfbar">
    <button class="tfb on" onclick="setTf(this,'1D')">1D</button>
    <button class="tfb" onclick="setTf(this,'5D')">5D</button>
    <button class="tfb" onclick="setTf(this,'1M')">1M</button>
    <button class="ind-toggle on" id="maToggle" onclick="toggleInd('ma')">MA</button>
    <button class="ind-toggle on" id="volToggle" onclick="toggleInd('vol')">VOL</button>
    <span id="tf-vol"></span>
  </div>

  <div id="chartBox">
    <canvas id="mainCvs"></canvas>
    <div id="tip"></div>
    <div id="ohlcBar">
      <span class="ob"><span>O </span><span id="oO">—</span></span>
      <span class="ob"><span>H </span><span id="oH" style="color:var(--green)">—</span></span>
      <span class="ob"><span>L </span><span id="oL" style="color:var(--red)">—</span></span>
      <span class="ob"><span>C </span><span id="oC">—</span></span>
    </div>
  </div>

  <div id="tradePanel">
    <div class="tp-top">
      <button class="side-btn buy on" id="buyBtn" onclick="setSide('buy')">▲ BUY</button>
      <button class="side-btn sell" id="sellBtn" onclick="setSide('sell')">▼ SELL</button>
      <div class="cash-box">
        <div class="cash-lbl">Cash</div>
        <div class="cash-val" id="cashVal">$25,000</div>
      </div>
    </div>
    <div class="tp-mid">
      <div class="qty-box">
        <div class="qa" id="qMinus" ontouchend="adjQ(-1);event.preventDefault()" onclick="adjQ(-1)">−</div>
        <input id="qInp" type="number" min="1" step="1" value="1" oninput="updCost()"/>
        <div class="qa" id="qPlus" ontouchend="adjQ(1);event.preventDefault()" onclick="adjQ(1)">+</div>
      </div>
      <button class="exec-btn buy" id="execBtn" onclick="placeOrder()">BUY</button>
    </div>
    <div class="tp-bot">
      <div class="tp-info">Est: <span id="estCost">$0.00</span></div>
      <div class="pos-tag" id="posTag"></div>
    </div>
  </div>
</div>

<!-- ══ PORTFOLIO SCREEN ══ -->

<div id="portScreen" class="screen off"></div>

<!-- ══ HISTORY SCREEN ══ -->

<div id="histScreen" class="screen off"></div>

<!-- ══ STATS SCREEN ══ -->

<div id="statsScreen" class="screen off"></div>

<!-- BOTTOM NAV — fixed, always on top -->

<nav id="nav">
  <button class="nb on" id="nb-chart" ontouchend="goTab('chart');event.preventDefault()">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Trade
  </button>
  <button class="nb" id="nb-port" ontouchend="goTab('port');event.preventDefault()">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    Portfolio
  </button>
  <button class="nb" id="nb-hist" ontouchend="goTab('hist');event.preventDefault()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
    History
  </button>
  <button class="nb" id="nb-stats" ontouchend="goTab('stats');event.preventDefault()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </button>
</nav>

<div id="toast"></div>

<script>
'use strict';

// ══ CONSTANTS ════════════════════════════════════════════
const START_BAL = 25000;
const STOCKS = [
  {sym:'AAPL', name:'Apple Inc.',      seed:227.50, vol:.020, drift:-.0001},
  {sym:'TSLA', name:'Tesla Inc.',      seed:248.00, vol:.042, drift:.0002},
  {sym:'NVDA', name:'NVIDIA Corp.',    seed:875.00, vol:.038, drift:.0003},
  {sym:'MSFT', name:'Microsoft Corp.', seed:415.00, vol:.018, drift:.0001},
  {sym:'AMZN', name:'Amazon.com',      seed:195.00, vol:.024, drift:.0001},
  {sym:'META', name:'Meta Platforms',  seed:510.00, vol:.028, drift:.0002},
  {sym:'GOOGL',name:'Alphabet Inc.',   seed:175.00, vol:.021, drift:.0001},
  {sym:'JPM',  name:'JPMorgan Chase',  seed:198.00, vol:.015, drift:.0000},
  {sym:'SPY',  name:'S&P 500 ETF',     seed:512.00, vol:.011, drift:.0001},
  {sym:'GME',  name:'GameStop Corp.',  seed:18.50,  vol:.075, drift:-.0002},
];

// ══ STATE ════════════════════════════════════════════════
let bal = START_BAL;
let port = {};   // {sym: {shares, avg, cost}}
let txs  = [];
let sel  = 'AAPL';
let curTab = 'chart';
let side = 'buy';
let tf = '1D';
let showMA = true;
let showVol = true;
let data = {};   // {sym: {candles:[], live:false, vol, drift}}
let portHist = [START_BAL];
let crossIdx = -1;
let tickTimer = null;

// ══ REALISTIC PRICE ENGINE ═══════════════════════════════
// Mean-reverting GBM — creates natural up/down waves
function nextPrice(p, vol, drift, mean) {
  // Mean reversion strength — pulls price back toward mean
  const revStrength = 0.008;
  const reversion = revStrength * (Math.log(mean / p));
  // Random shock with 3-point approx of normal distribution
  const u1 = Math.random(), u2 = Math.random();
  const z = Math.sqrt(-2 * Math.log(Math.max(u1, 1e-9))) * Math.cos(2 * Math.PI * u2);
  const ret = drift + reversion + vol * 0.018 * z;
  return Math.max(p * 0.7, Math.min(p * 1.3, p * Math.exp(ret)));
}

function buildCandles(seed, vol, drift, n = 400) {
  let p = seed * (0.92 + Math.random() * 0.16);
  const mean = seed; // revert toward original seed
  const now = Date.now();
  const cs = [];
  for (let i = n; i >= 0; i--) {
    const o = p;
    // Generate 4 intra-bar moves for realistic H/L
    for (let j = 0; j < 4; j++) p = nextPrice(p, vol, drift / 4, mean);
    const c = +p.toFixed(2);
    // High/low from random walk intra-bar
    const swing = vol * o * (0.3 + Math.random() * 0.7);
    const h = +(Math.max(o, c) * (1 + Math.random() * swing * 0.5)).toFixed(2);
    const l = +(Math.min(o, c) * (1 - Math.random() * swing * 0.5)).toFixed(2);
    cs.push({ t: now - i * 61000, o: +o.toFixed(2), h, l, c, v: Math.floor(3e5 + Math.random() * 2.5e6) });
  }
  return cs;
}

STOCKS.forEach(s => {
  data[s.sym] = { ...s, candles: buildCandles(s.seed, s.vol, s.drift), live: false };
});

// ══ LIVE DATA ════════════════════════════════════════════
async function fetchLive(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxy, { signal: AbortSignal.timeout(9000) });
    if (!r.ok) return null;
    const j = await r.json();
    const res = JSON.parse(j.contents)?.chart?.result?.[0];
    if (!res) return null;
    const q = res.indicators.quote[0];
    const cs = res.timestamp.map((t, i) => ({
      t: t * 1000,
      o: +(q.open[i] || 0).toFixed(2),
      h: +(q.high[i] || 0).toFixed(2),
      l: +(q.low[i] || 0).toFixed(2),
      c: +(q.close[i] || 0).toFixed(2),
      v: q.volume[i] || 0,
    })).filter(c => c.c > 0.01);
    return cs.length > 10 ? cs : null;
  } catch { return null; }
}

(async () => {
  try {
    const results = await Promise.all(STOCKS.map(s => fetchLive(s.sym).then(c => ({ sym: s.sym, c }))));
    let any = false;
    results.forEach(({ sym, c }) => {
      if (c) { data[sym].candles = c; data[sym].live = true; any = true; }
    });
    const pill = document.getElementById('livePill');
    const pt = document.getElementById('pillText');
    if (any) {
      pill.className = 'live-pill live';
      pt.textContent = 'LIVE';
    } else {
      pill.className = 'live-pill sim';
      pt.textContent = 'SIM';
    }
  } catch { /* stay sim */ }
  renderStockRow();
  refreshPriceBar();
  schedDraw();
})();

// ══ TICK SIMULATION ══════════════════════════════════════
// Only updates canvas — never rebuilds DOM
setInterval(() => {
  STOCKS.forEach(s => {
    const d = data[s.sym];
    const cs = d.candles;
    const last = cs[cs.length - 1];
    const nc = +nextPrice(last.c, d.vol, d.drift, d.seed).toFixed(2);
    cs[cs.length - 1] = {
      ...last, c: nc,
      h: +Math.max(last.h, nc).toFixed(2),
      l: +Math.min(last.l, nc).toFixed(2),
    };
    if (Date.now() - last.t > 61000) {
      cs.push({ t: Date.now(), o: last.c, h: nc, l: nc, c: nc, v: Math.floor(3e5 + Math.random() * 2e6) });
      if (cs.length > 800) cs.shift();
    }
  });
  portHist.push(+(bal + portVal()).toFixed(2));
  if (portHist.length > 500) portHist.shift();

  updateHeader();
  updateStockRowPrices();
  if (curTab === 'chart') {
    refreshPriceBar();
    schedDraw();
    updCost();
    updatePosTag();
  }
}, 3000);

function portVal() { return Object.entries(port).reduce((s, [sym, p]) => s + p.shares * data[sym].candles.at(-1).c, 0); }

    const l = data[s.sym].candles.at(-1);
    const p = data[s.sym].candles.at(-2) || l;

function updateStockRowPrices() {
  document.querySelectorAll('.stk').forEach(el => {
    const sym = el.dataset.sym; if (!sym) return;
    const l = data[sym].candles.at(-1), p2 = data[sym].candles.at(-2) || l;
    const chg = (l.c - p2.c) / p2.c * 100, up = chg >= 0;
    el.querySelector('.stk-price').textContent = '$' + l.c.toFixed(l.c >= 100 ? 1 : 2);
    const cc = el.querySelector('.stk-chg');
    cc.textContent = (up ? '▲' : '▼') + Math.abs(chg).toFixed(1) + '%';
    cc.className = 'stk-chg ' + (up ? 'up' : 'dn');

function pickStock(sym) {

  document.querySelectorAll('.stk').forEach(e => e.classList.toggle('on', e.dataset.sym === sym));

// ══ DRAW (RAF-based — no flicker) ════════════════════════
let _rafPending = false;
function schedDraw() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; drawMain(); });
}

function getSlice() {
  const all = data[sel].candles;
  const n = tf === '1D' ? Math.min(195, all.length)
          : tf === '5D' ? Math.min(100, all.length)
          : all.length;
  return all.slice(-n);
}

// MA helper
function calcMA(cs, p) {
  return cs.map((_, i) => {
    if (i < p - 1) return null;
    return cs.slice(i - p + 1, i + 1).reduce((s, c) => s + c.c, 0) / p;
  });
}

function drawMain() {
  const canvas = $id('mainCvs');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;

  // Resize only when needed
  const tw = Math.round(W * dpr), th = Math.round(H * dpr);
  if (canvas.width !== tw || canvas.height !== th) { canvas.width = tw; canvas.height = th; }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cs = getSlice();
  if (cs.length < 2) return;

  // Layout
  const pL = 6, pR = 62, pT = 28, pB = showVol ? 52 : 24;
  const cW = W - pL - pR, cH = H - pT - pB;
  const volH = showVol ? 36 : 0;
  const candleH = cH - (showVol ? volH + 6 : 0);

  const maxP = Math.max(...cs.map(c => c.h));
  const minP = Math.min(...cs.map(c => c.l));
  const pad = (maxP - minP) * 0.06;
  const hiP = maxP + pad, loP = Math.max(0, minP - pad);
  const range = hiP - loP || 1;

  const toY = p => pT + candleH - ((p - loP) / range) * candleH;
  const colW = cW / cs.length;
  const bW = Math.max(1.5, Math.min(colW - 1, 9));

  // ── Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // ── Grid
  const gridSteps = 5;
  ctx.font = '9px Roboto Mono, monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i <= gridSteps; i++) {
    const prc = loP + (range / gridSteps) * i;
    const y = pT + candleH - (i / gridSteps) * candleH;
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(W - pR, y); ctx.stroke();
    ctx.fillStyle = '#44445a';
    ctx.fillText('$' + prc.toFixed(prc >= 100 ? 0 : 2), W - pR + 5, y + 3);
  }

  // ── Time axis
  ctx.fillStyle = '#44445a';
  ctx.font = '8px Roboto Mono, monospace';
  const tStep = Math.max(1, Math.floor(cs.length / 5));
  for (let i = 0; i < cs.length; i += tStep) {
    const x = pL + (i + 0.5) * colW;
    const d = new Date(cs[i].t);
    const lbl = tf === '1M'
      ? d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
      : d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    ctx.fillText(lbl, x - 14, H - (showVol ? volH + 4 : 4));
  }

  // ── Volume bars (below candles)
  if (showVol) {
    const maxV = Math.max(...cs.map(c => c.v)) || 1;
    const volTop = pT + candleH + 10;
    cs.forEach((c, i) => {
      const x = pL + i * colW;
      const up = c.c >= c.o;
      const vh = (c.v / maxV) * (volH - 6);
      ctx.fillStyle = up ? 'rgba(38,222,129,0.45)' : 'rgba(252,92,125,0.45)';
      ctx.fillRect(x + 0.5, volTop + (volH - 6) - vh, Math.max(1, bW), vh);
    });
    // VOL label
    ctx.fillStyle = '#44445a';
    ctx.font = '8px Roboto Mono, monospace';
    ctx.fillText('VOL', W - pR + 5, volTop + 8);
  }

  // ── MA lines
  if (showMA && cs.length >= 20) {
    const ma20 = calcMA(cs, 20);
    const ma50 = calcMA(cs, Math.min(50, cs.length));

    // MA50 first (behind)
    ctx.beginPath();
    let started = false;
    ma50.forEach((v, i) => {
      if (v === null) return;
      const x = pL + (i + 0.5) * colW, y = toY(v);
      started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true);
    });
    ctx.strokeStyle = 'rgba(255,201,64,0.7)'; ctx.lineWidth = 1.2; ctx.setLineDash([]); ctx.stroke();

    // MA20
    ctx.beginPath(); started = false;
    ma20.forEach((v, i) => {
      if (v === null) return;
      const x = pL + (i + 0.5) * colW, y = toY(v);
      started ? ctx.lineTo(x, y) : (ctx.moveTo(x, y), started = true);
    });
    ctx.strokeStyle = 'rgba(75,142,255,0.85)'; ctx.lineWidth = 1.2; ctx.stroke();
  }

  // ── Candles
  cs.forEach((c, i) => {
    const x = pL + (i + 0.5) * colW;
    const up = c.c >= c.o;
    const green = '#26de81', red = '#fc5c7d';
    const col = up ? green : red;

    // Wick
    const wickW = Math.max(0.7, bW * 0.12);
    ctx.fillStyle = col;
    ctx.fillRect(x - wickW / 2, toY(c.h), wickW, toY(c.l) - toY(c.h));

    // Body
    const bodyTop = toY(Math.max(c.o, c.c));
    const bodyBot = toY(Math.min(c.o, c.c));
    const bodyH = Math.max(1.5, bodyBot - bodyTop);

    if (bW >= 2) {
      ctx.fillStyle = col;
      ctx.fillRect(x - bW / 2, bodyTop, bW, bodyH);
      // Darken inside if up (hollow feel on big bars)
      if (up && bW > 4) {
        ctx.fillStyle = 'rgba(10,10,15,0.25)';
        ctx.fillRect(x - bW / 2 + 0.5, bodyTop + 0.5, bW - 1, bodyH - 1);
      }
    } else {
      ctx.fillStyle = col;
      ctx.fillRect(x - 0.75, bodyTop, 1.5, bodyH);
    }
  });

  // ── Crosshair
  if (crossIdx >= 0 && crossIdx < cs.length) {
    const x = pL + (crossIdx + 0.5) * colW;
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, pT); ctx.lineTo(x, pT + candleH); ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Last price line + tag
  const last = cs.at(-1);
  const ly = toY(last.c);
  const up0 = last.c >= cs[0].c;
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = up0 ? 'rgba(38,222,129,.4)' : 'rgba(252,92,125,.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pL, ly); ctx.lineTo(W - pR, ly); ctx.stroke();
  ctx.setLineDash([]);

  // Price pill
  const tagW = 56, tagH = 16;
  ctx.fillStyle = up0 ? '#20c96b' : '#e03060';
  ctx.beginPath(); ctx.roundRect(W - pR + 3, ly - tagH / 2, tagW, tagH, 3); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Roboto Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('$' + last.c.toFixed(2), W - pR + 7, ly + 4);
}

// ══ TOUCH CROSSHAIR ══════════════════════════════════════
const cvs = document.getElementById('mainCvs');
function handleTouch(ex) {
  const rect = cvs.getBoundingClientRect();
  const cs = getSlice();
  const pL = 6, pR = 62, cW = rect.width - pL - pR, colW = cW / cs.length;
  const x = ex - rect.left - pL;
  const idx = Math.max(0, Math.min(cs.length - 1, Math.floor(x / colW)));
  crossIdx = idx;
  const c = cs[idx];
  const up = c.c >= c.o;
  const d = new Date(c.t);
  const lbl = tf === '1M'
    ? d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
    : d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
  const tip = $id('tip');
  tip.innerHTML = `<span style="color:var(--t3)">${lbl}</span>
    &nbsp;O:<b>$${c.o.toFixed(2)}</b>
    &nbsp;H:<b style="color:var(--green)">$${c.h.toFixed(2)}</b>
    &nbsp;L:<b style="color:var(--red)">$${c.l.toFixed(2)}</b>
    &nbsp;C:<b style="color:${up?'var(--green)':'var(--red)'}">$${c.c.toFixed(2)}</b>`;
  tip.style.display = 'block';
  schedDraw();
}
cvs.addEventListener('touchmove', e => { e.preventDefault(); handleTouch(e.touches[0].clientX); }, { passive: false });
cvs.addEventListener('touchend', () => {
  crossIdx = -1;
  $id('tip').style.display = 'none';
  schedDraw();
});
cvs.addEventListener('mousemove', e => handleTouch(e.clientX));
cvs.addEventListener('mouseleave', () => {
  crossIdx = -1;
  $id('tip').style.display = 'none';
  schedDraw();
});

// ══ TRADE PANEL ══════════════════════════════════════════
function setSide(s) {
  side = s;
  $id('buyBtn').classList.toggle('on', s === 'buy');
  $id('sellBtn').classList.toggle('on', s === 'sell');
  $id('execBtn').textContent = s === 'buy' ? 'BUY' : 'SELL';
  $id('execBtn').className = 'exec-btn ' + s;
  updCost();
}

function adjQ(d) {
  const el = $id('qInp');
  let v = Math.max(1, (parseInt(el.value) || 1) + d);
  el.value = v;
  updCost();
}

function updCost() {
  const q = parseFloat($id('qInp')?.value) || 0;
  const p = data[sel].candles.at(-1).c;
  $id('estCost').textContent = '$' + (q * p).toFixed(2);
}

function updatePosTag() {
  const pos = port[sel];
  const el = $id('posTag');
  if (!el) return;
  if (pos) {
    const cp = data[sel].candles.at(-1).c;
    const pnl = +((cp - pos.avg) * pos.shares).toFixed(2), up = pnl >= 0;
    el.textContent = pos.shares + 'sh · ' + (up ? '+' : '') + '$' + pnl.toFixed(2);
    el.className = 'pos-tag ' + (up ? 'up' : 'dn');
  } else {
    el.textContent = '';
  }
}

function placeOrder() {
  const q = parseFloat($id('qInp').value) || 0;
  if (q <= 0) { toast('⚠ Enter a quantity'); return; }
  const cp = data[sel].candles.at(-1).c;
  const total = +(q * cp).toFixed(2);
  if (side === 'buy') {
    if (total > bal) { toast('⚠ Insufficient cash'); return; }
    bal = +(bal - total).toFixed(2);
    const ex = port[sel] || { shares: 0, avg: 0 };
    const ns = +(ex.shares + q).toFixed(4);
    port[sel] = { shares: ns, avg: +((ex.shares * ex.avg + total) / ns).toFixed(2) };
    toast('✓ Bought ' + q + ' ' + sel + ' @ $' + cp.toFixed(2));
  } else {
    if (!port[sel] || port[sel].shares < q) { toast('⚠ Not enough shares'); return; }
    bal = +(bal + total).toFixed(2);
    const ns = +(port[sel].shares - q).toFixed(4);
    if (ns < 0.001) delete port[sel];
    else port[sel] = { ...port[sel], shares: ns };
    toast('✓ Sold ' + q + ' ' + sel + ' @ $' + cp.toFixed(2));
  }
  txs.unshift({ t: Date.now(), sym: sel, side, shares: q, price: cp, total });
  if (txs.length > 300) txs.pop();
  updateHeader();
  updatePosTag();
}

        P&L ${up?'▲':'▼'} ${up?'+':''}$${fmt(pnl)} &nbsp;·&nbsp; ${((pnl/START_BAL)*100).toFixed(2)}%
      </div>
    </div>
    ${portHist.length>3?`
    <div class="sec">Value History</div>
    <div class="pchart-wrap"><canvas id="portCvs"></canvas></div>`:''}
    <div class="sec">Open Positions (${Object.keys(port).length})</div>
    ${!Object.keys(port).length
      ?'<div class="empty"><div class="empty-ico">📈</div>No positions yet.<br>Go to Trade to get started.</div>'
      :Object.entries(port).map(([sym,p])=>{
        const cp=data[sym].candles.at(-1).c;
        const pv2=+(cp*p.shares).toFixed(2);
        const pp=+((cp-p.avg)*p.shares).toFixed(2),pu=pp>=0;
        const ppp=(((cp-p.avg)/p.avg)*100).toFixed(2);
        return `<div class="pos-card ${pu?'up':'dn'}" onclick="pickStock('${sym}')">
          <div class="pc-top">
            <div><div class="pc-sym">${sym}</div><div class="pc-sh">${p.shares} shares · avg $${p.avg}</div></div>
            <div><div class="pc-val">$${fmt(pv2)}</div>
              <div class="pc-pnl ${pu?'up':'dn'}">${pu?'+':''}$${fmt(pp)} (${pu?'+':''}${ppp}%)</div>
            </div>
          </div>
          <div class="pc-sub">Current $${cp.toFixed(2)} · Cost $${(p.shares*p.avg).toFixed(2)}</div>
        </div>`;
      }).join('')}
  `;
  setTimeout(() => {
    const c = $id('portCvs'); if (!c) return;
    const dpr = window.devicePixelRatio || 1;
    const W = c.offsetWidth, H = c.offsetHeight; if (!W||!H) return;
    c.width = W*dpr; c.height = H*dpr;
    const ctx = c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    const vals = portHist; if(vals.length<2) return;
    const hi=Math.max(...vals)*1.01,lo=Math.min(...vals)*.99,rng=hi-lo||1;
    const toX=i=>((i/(vals.length-1))*W);
    const toY=v=>H-((v-lo)/rng)*H*.9-H*.05;
    const up=vals.at(-1)>=vals[0];
    ctx.fillStyle='#111117';ctx.fillRect(0,0,W,H);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,up?'rgba(38,222,129,.18)':'rgba(252,92,125,.18)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));
    vals.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.lineTo(toX(vals.length-1),H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));
    vals.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.strokeStyle=up?'#26de81':'#fc5c7d';ctx.lineWidth=2;ctx.stroke();
  }, 30);
}

// ══ HISTORY ══════════════════════════════════════════════
function renderHist() {
  const bought = txs.filter(t=>t.side==='buy').reduce((s,t)=>s+t.total,0);
  const sold = txs.filter(t=>t.side==='sell').reduce((s,t)=>s+t.total,0);
  $id('histScreen').innerHTML = `
    <div class="sec">Trade History (${txs.length})</div>
    ${txs.length?`
    <div class="g3">
      <div class="sbox"><div class="sl">Trades</div><div class="sv">${txs.length}</div></div>
      <div class="sbox"><div class="sl">Bought</div><div class="sv up" style="font-size:13px">$${fmt(bought)}</div></div>
      <div class="sbox"><div class="sl">Sold</div><div class="sv dn" style="font-size:13px">$${fmt(sold)}</div></div>
    </div>`:''}
    ${!txs.length
      ?'<div class="empty"><div class="empty-ico">📋</div>No trades yet.<br>Head to Trade to begin!</div>'
      :txs.map(tx=>{
        const d=new Date(tx.t);
        const ds=d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
        return `<div class="tx-card" onclick="pickStock('${tx.sym}')">
          <div><div class="tx-sym">${tx.sym}</div><div class="tx-dt">${ds}</div></div>
          <div style="text-align:center">
            <div class="badge ${tx.side}">${tx.side.toUpperCase()}</div>
            <div class="tx-sh">${tx.shares}sh</div>
          </div>
          <div><div class="tx-amt">$${fmt(tx.total)}</div><div class="tx-at">@ $${tx.price.toFixed(2)}</div></div>
        </div>`;
      }).join('')}
  `;
}

// ══ STATS ════════════════════════════════════════════════
function renderStats() {
  const pv=portVal(),tv=totalVal(),pnl=+(tv-START_BAL).toFixed(2);
  const sells=txs.filter(t=>t.side==='sell');
  const wins=sells.filter(t=>{ const b=txs.find(x=>x.sym===t.sym&&x.side==='buy'&&x.t<t.t); return b?t.price>b.price:false; });
  const wr=sells.length?Math.round(wins.length/sells.length*100):0;
  const best=sells.reduce((b,t)=>{ const bx=txs.find(x=>x.sym===t.sym&&x.side==='buy'&&x.t<t.t); const p=bx?(t.price-bx.price)*t.shares:0; return p>b.p?{sym:t.sym,p}:b; },{sym:'—',p:0});
  $id('statsScreen').innerHTML = `
    <div class="sec">Performance</div>
    <div class="g3">
      <div class="sbox"><div class="sl">Return</div><div class="sv ${pnl>=0?'up':'dn'}" style="font-size:14px">${pnl>=0?'+':''}${((pnl/START_BAL)*100).toFixed(1)}%</div></div>
      <div class="sbox"><div class="sl">P&L</div><div class="sv ${pnl>=0?'up':'dn'}" style="font-size:13px">${pnl>=0?'+':''}$${fmt(pnl)}</div></div>
      <div class="sbox"><div class="sl">Win Rate</div><div class="sv ${wr>=50?'up':'dn'}">${wr}%</div></div>
    </div>
    <div class="g3">
      <div class="sbox"><div class="sl">Trades</div><div class="sv">${txs.length}</div></div>
      <div class="sbox"><div class="sl">Positions</div><div class="sv">${Object.keys(port).length}</div></div>
      <div class="sbox"><div class="sl">Cash</div><div class="sv" style="font-size:12px">$${(bal/1000).toFixed(1)}k</div></div>
    </div>

    <div class="sec">Best Trade</div>
    <div class="card">
      <div class="row"><span class="rk">Symbol</span><span class="rv">${best.sym}</span></div>
      <div class="row"><span class="rk">Profit</span><span class="rv ${best.p>=0?'up':'dn'}">${best.p>=0?'+':''}$${best.p.toFixed(2)}</span></div>
    </div>

    <div class="sec">Watchlist</div>
    ${STOCKS.map(s=>{
      const l=data[s.sym].candles.at(-1),p2=data[s.sym].candles.at(-2)||l;
      const dc=(l.c-p2.c)/p2.c*100,up=dc>=0;
      const pos=port[s.sym];
      const posPnl=pos?(l.c-pos.avg)*pos.shares:null;
      return `<div class="wl-card" onclick="pickStock('${s.sym}')">
        <div><div class="wl-sym">${s.sym}</div><div class="wl-name">${s.name}</div></div>
        <div style="text-align:center">
          <div class="wl-price">$${l.c.toFixed(l.c>=100?2:2)}</div>
          <div class="wl-chg ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(dc).toFixed(2)}%</div>
        </div>
        <div style="text-align:right;min-width:60px">
          ${posPnl!==null
            ?`<div class="wl-pos ${posPnl>=0?'up':'dn'}">${posPnl>=0?'+':''}$${posPnl.toFixed(2)}</div>
              <div style="font-size:9px;color:var(--t3);font-family:var(--mono)">${pos.shares}sh</div>`
            :`<div style="font-size:11px;color:var(--t3)">—</div>`}
        </div>
      </div>`;
    }).join('')}

    <div style="margin-top:16px;padding:14px;background:var(--s1);border-radius:10px;border:1px solid var(--b1);text-align:center">
      <button onclick="if(confirm('Reset account to $25,000?')){resetAll()}"
        style="padding:11px 22px;background:var(--s2);border:1px solid var(--b1);border-radius:100px;
          font-size:12px;font-weight:700;color:var(--t3);font-family:var(--mono)">
        ↺ &nbsp;Reset Account
      </button>
    </div>
  `;
}

function resetAll() {
  bal = START_BAL; port = {}; txs = []; portHist = [START_BAL];
  toast('✓ Account reset to $25,000');
  updateHeader();
}

// ══ INIT ═════════════════════════════════════════════════
updateHeader();
renderStockRow();
refreshPriceBar();
setSide('buy');
updCost();
setTimeout(schedDraw, 80);

// Handle resize
window.addEventListener('resize', schedDraw);
</script>

</body>
</html>
