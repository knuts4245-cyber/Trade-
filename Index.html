<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>PaperTrade Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#090912;color:#e0e0f0;font-family:system-ui,-apple-system,sans-serif;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;border:none;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{display:none}
.header{background:#111120;border-bottom:1px solid #1a1a30;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo{font-weight:800;font-size:17px;color:#7c3aed}
.hval{text-align:right}
.hval .tv{font-weight:800;font-size:16px}
.hval .pnl{font-size:11px;font-weight:700}
.modebar{padding:3px 14px;font-size:10px;display:flex;align-items:center;gap:6px}
.modedot{width:6px;height:6px;border-radius:50%;display:inline-block}
.ticker-strip{display:flex;overflow-x:auto;background:#111120;border-bottom:1px solid #1a1a30;scrollbar-width:none}
.ticker-item{flex-shrink:0;padding:6px 10px;cursor:pointer;border-bottom:2px solid transparent;min-width:60px;text-align:center;transition:background .15s}
.ticker-item.active{background:#1a1a2e;border-bottom-color:#7c3aed}
.ticker-sym{font-size:11px;font-weight:800}
.ticker-chg{font-size:9px;font-weight:600}
.tabs{display:flex;background:#111120;border-bottom:1px solid #1a1a30}
.tab{flex:1;padding:10px 2px;font-size:12px;font-weight:600;background:transparent;color:#555;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{background:#1a1a2e;color:#7c3aed;border-bottom-color:#7c3aed}
.content{flex:1;overflow-y:auto;padding:12px 14px 80px}
.stock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.stock-price{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.stock-name{font-size:11px;color:#555;margin-bottom:2px}
.price-chg{font-size:16px;font-weight:700;text-align:right}
.price-pct{font-size:13px;font-weight:600;text-align:right}
canvas{width:100%;height:230px;border-radius:10px;display:block;border:1px solid #1a1a30}
.tf-row{display:flex;gap:6px;margin:8px 0 12px;align-items:center}
.tf-btn{padding:4px 11px;font-size:11px;font-weight:700;border-radius:5px;background:#1a1a2e;color:#555;transition:all .15s}
.tf-btn.active{background:#7c3aed;color:#fff}
.ohlc{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.ohlc-cell{background:#111120;border-radius:7px;padding:7px 8px;text-align:center;border:1px solid #1a1a30}
.ohlc-l{font-size:9px;color:#555;margin-bottom:2px;text-transform:uppercase}
.ohlc-v{font-size:12px;font-weight:700}
.order-panel{background:#111120;border-radius:14px;padding:14px;border:1px solid #1a1a30}
.side-toggle{display:flex;border-radius:9px;overflow:hidden;margin-bottom:12px}
.side-btn{flex:1;padding:11px;font-weight:800;font-size:13px;background:#1a1a2e;color:#555;transition:all .15s}
.side-btn.buy.active{background:#26a69a;color:#fff}
.side-btn.sell.active{background:#ef5350;color:#fff}
.qty-input{width:100%;padding:10px 12px;background:#090912;border:1px solid #1a1a30;border-radius:8px;color:#e0e0f0;font-size:14px;margin-bottom:10px;outline:none}
.cost-row{display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:5px}
.cost-val{color:#e0e0f0;font-weight:600}
.exec-btn{width:100%;padding:14px;font-size:14px;font-weight:800;border-radius:10px;color:#fff;margin-top:8px;letter-spacing:.3px;transition:opacity .15s}
.exec-btn:active{opacity:.8}
.surf{background:#111120;border-radius:12px;padding:14px;border:1px solid #1a1a30;margin-bottom:14px}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #1a1a30;font-size:13px}
.sum-row:first-child{border-top:none}
.sum-row.big{font-size:15px;font-weight:800}
.pnl-badge{margin-top:10px;padding:10px;border-radius:9px;text-align:center;font-weight:800;font-size:15px}
.pos-card{background:#111120;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #1a1a30;cursor:pointer}
.pos-head{display:flex;justify-content:space-between;margin-bottom:3px}
.pos-sym{font-weight:800;font-size:16px}
.pos-shares{font-size:11px;color:#555}
.pos-val{font-weight:700;text-align:right}
.pos-pnl{font-size:12px;font-weight:700;text-align:right}
.pos-sub{font-size:11px;color:#555}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a30;cursor:pointer}
.tx-sym{font-weight:700}
.tx-time{font-size:11px;color:#555}
.tx-side{font-size:11px;font-weight:800;text-transform:uppercase}
.tx-sh{font-size:11px;color:#555}
.tx-total{font-weight:700;text-align:right}
.tx-price{font-size:11px;color:#555;text-align:right}
.empty{text-align:center;color:#555;padding:40px;font-size:13px}
.green{color:#26a69a}.red{color:#ef5350}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📈 PaperTrade Pro</div>
  <div class="hval">
    <div style="font-size:11px;color:#555">Total Value</div>
    <div class="tv" id="hTotal">$25,000.00</div>
    <div class="pnl" id="hPnl">+$0.00 (0.00%)</div>
  </div>
</div>

<div class="modebar" id="modebar" style="background:#1a1a08;color:#ccaa00">
  <span class="modedot" id="modedot" style="background:#ffcc00"></span>
  <span id="modetext">⚡ Loading live data...</span>
</div>

<div class="ticker-strip" id="tickerStrip"></div>

<div class="tabs">
  <button class="tab active" onclick="showTab('chart')">📊 Chart</button>
  <button class="tab" onclick="showTab('port')">💼 Portfolio</button>
  <button class="tab" onclick="showTab('hist')">📋 History</button>
</div>

<div class="content" id="content"></div>

<script>
const SB = 25000;
const STOCKS = [
  {sym:"AAPL",name:"Apple Inc.",     seed:227.50,vol:0.018},
  {sym:"TSLA",name:"Tesla Inc.",     seed:248.00,vol:0.038},
  {sym:"NVDA",name:"NVIDIA Corp.",   seed:875.00,vol:0.035},
  {sym:"MSFT",name:"Microsoft",      seed:415.00,vol:0.016},
  {sym:"AMZN",name:"Amazon",         seed:195.00,vol:0.022},
  {sym:"META",name:"Meta Platforms", seed:510.00,vol:0.025},
  {sym:"GOOGL",name:"Alphabet",      seed:175.00,vol:0.019},
  {sym:"JPM", name:"JPMorgan",       seed:198.00,vol:0.014},
  {sym:"SPY", name:"S&P 500 ETF",    seed:512.00,vol:0.010},
  {sym:"GME", name:"GameStop",       seed:18.50, vol:0.065},
];

let bal = SB, port = {}, txs = [], sel = "AAPL", curTab = "chart", side = "buy", tf = "1D";
let stockData = {};

function gbm(p,v){
  const z=(Math.random()+Math.random()+Math.random())-1.5;
  return +Math.max(0.01,(p*Math.exp(0.00003+v*z*0.004))).toFixed(2);
}

function genHistory(seed,vol,n=200){
  let p=seed*(0.93+Math.random()*0.14), cs=[];
  for(let i=n;i>=0;i--){
    const o=p; p=gbm(p,vol);
    const hi=+(Math.max(o,p)*(1+Math.random()*vol*0.4)).toFixed(2);
    const lo=+(Math.min(o,p)*(1-Math.random()*vol*0.4)).toFixed(2);
    cs.push({t:Date.now()-i*60000,o:+o.toFixed(2),h:hi,l:lo,c:+p.toFixed(2),v:Math.floor(5e5+Math.random()*2e6)});
  }
  return cs;
}

// Init
STOCKS.forEach(s=>{
  stockData[s.sym]={...s,candles:genHistory(s.seed,s.vol),live:false};
});

// Try live fetch
async function fetchLive(sym){
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1m&range=1d`;
    const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(7000)});
    const j=await r.json();
    const res=JSON.parse(j.contents).chart.result[0];
    const q=res.indicators.quote[0];
    const cs=res.timestamp.map((t,i)=>({
      t:t*1000,o:+(q.open[i]||0).toFixed(2),h:+(q.high[i]||0).toFixed(2),
      l:+(q.low[i]||0).toFixed(2),c:+(q.close[i]||0).toFixed(2),v:q.volume[i]||0
    })).filter(c=>c.c>0);
    return cs.length>5?cs:null;
  }catch{return null;}
}

(async()=>{
  const results=await Promise.all(STOCKS.map(s=>fetchLive(s.sym).then(c=>({sym:s.sym,candles:c}))));
  let any=false;
  results.forEach(({sym,candles})=>{
    if(candles){stockData[sym].candles=candles;stockData[sym].live=true;any=true;}
  });
  const mb=document.getElementById('modebar'),md=document.getElementById('modedot'),mt=document.getElementById('modetext');
  if(any){mb.style.background='#0a2218';mb.style.color='#26a69a';md.style.background='#26a69a';mt.textContent='● LIVE — Yahoo Finance real-time data';}
  else{mb.style.background='#1a1a08';mb.style.color='#ccaa00';md.style.background='#ffcc00';mt.textContent='⚡ SIMULATION — Realistic market engine';}
  renderAll();
})();

// Tick
setInterval(()=>{
  Object.keys(stockData).forEach(sym=>{
    const s=stockData[sym],cs=s.candles,last=cs[cs.length-1];
    const nc=gbm(last.c,s.vol);
    cs[cs.length-1]={...last,c:nc,h:+Math.max(last.h,nc).toFixed(2),l:+Math.min(last.l,nc).toFixed(2)};
    if(Date.now()-last.t>60000){
      cs.push({t:Date.now(),o:last.c,h:nc,l:nc,c:nc,v:Math.floor(5e5+Math.random()*1.5e6)});
      if(cs.length>500)cs.shift();
    }
  });
  renderAll();
},2000);

function fmt(n,d=2){return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}

function renderAll(){
  renderHeader();
  renderTicker();
  if(curTab==='chart')renderChart();
  else if(curTab==='port')renderPort();
  else renderHist();
}

function renderHeader(){
  const portVal=Object.entries(port).reduce((s,[sym,p])=>s+p.shares*stockData[sym].candles.at(-1).c,0);
  const total=+(bal+portVal).toFixed(2);
  const pnl=+(total-SB).toFixed(2);
  document.getElementById('hTotal').textContent='$'+fmt(total);
  const pel=document.getElementById('hPnl');
  pel.textContent=(pnl>=0?'+':'')+pnl.toFixed(2)+' ('+((pnl/SB)*100).toFixed(2)+'%)';
  pel.className='pnl '+(pnl>=0?'green':'red');
}

function renderTicker(){
  const strip=document.getElementById('tickerStrip');
  strip.innerHTML=STOCKS.map(s=>{
    const cs=stockData[s.sym].candles,l=cs.at(-1),p2=cs.at(-2)||l;
    const c2=((l.c-p2.c)/p2.c*100),u2=c2>=0;
    return`<div class="ticker-item${s.sym===sel?' active':''}" onclick="selectStock('${s.sym}')">
      <div class="ticker-sym">${s.sym}</div>
      <div class="ticker-chg ${u2?'green':'red'}">${u2?'▲':'▼'}${Math.abs(c2).toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function selectStock(sym){sel=sym;renderAll();}

function showTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['chart','port','hist'][i]===t);
  });
  renderAll();
}

function drawChart(){
  const canvas=document.getElementById('mainChart');
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);

  const all=stockData[sel].candles;
  const count=tf==='1D'?Math.min(390,all.length):tf==='5D'?Math.min(80,all.length):all.length;
  const cs=all.slice(-count);
  if(cs.length<2)return;

  const maxP=Math.max(...cs.map(c=>c.h))*1.002,minP=Math.min(...cs.map(c=>c.l))*0.998,range=maxP-minP;
  const pL=4,pR=62,pT=14,pB=28,cW=W-pL-pR,cH=H-pT-pB;
  const toY=p=>pT+cH-((p-minP)/range)*cH;
  const colW=cW/cs.length,bW=Math.max(1,colW-1);

  ctx.fillStyle='#090912';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#13132a';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pT+(cH/4)*i;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();
    ctx.fillStyle='#3a3a55';ctx.font='10px monospace';
    ctx.fillText('$'+(maxP-(range/4)*i).toFixed(2),W-pR+3,y+4);
  }

  const maxV=Math.max(...cs.map(c=>c.v));
  cs.forEach((c,i)=>{
    const x=pL+i*colW+colW/2,up=c.c>=c.o;
    ctx.fillStyle=up?'rgba(38,166,154,0.15)':'rgba(239,83,80,0.15)';
    const vh=(c.v/maxV)*cH*0.22;
    ctx.fillRect(x-bW/2,pT+cH-vh,bW,vh);
    const col=up?'#26a69a':'#ef5350';
    ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,toY(c.h));ctx.lineTo(x,toY(c.l));ctx.stroke();
    const by=toY(Math.max(c.o,c.c)),bh=Math.max(1,toY(Math.min(c.o,c.c))-by);
    if(bW>=3)ctx.fillRect(x-bW/2,by,bW,bh);
    else{ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,toY(c.o));ctx.lineTo(x,toY(c.c));ctx.stroke();}
  });

  const last=cs.at(-1),ly=toY(last.c),up0=last.c>=cs[0].o;
  ctx.setLineDash([3,3]);ctx.strokeStyle=up0?'#26a69a':'#ef5350';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pL,ly);ctx.lineTo(W-pR,ly);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=up0?'#26a69a':'#ef5350';
  ctx.fillRect(W-pR+1,ly-9,pR-2,18);
  ctx.fillStyle='#fff';ctx.font='bold 10px monospace';
  ctx.fillText('$'+last.c.toFixed(2),W-pR+3,ly+4);
}

function renderChart(){
  const cur=stockData[sel],cs=cur.candles,last=cs.at(-1),prev=cs.at(-2)||last;
  const chg=+(last.c-prev.c).toFixed(2),pct=+((chg/prev.c)*100).toFixed(2),up=chg>=0;
  const pos=port[sel];
  const est=+((parseFloat(document.getElementById('qtyInput')?document.getElementById('qtyInput').value:'1')||1)*last.c).toFixed(2);

  document.getElementById('content').innerHTML=`
    <div class="stock-header">
      <div>
        <div class="stock-name">${cur.name} · ${sel}</div>
        <div class="stock-price">$${last.c.toFixed(2)}</div>
      </div>
      <div>
        <div class="price-chg ${up?'green':'red'}">${up?'▲':'▼'} $${Math.abs(chg)}</div>
        <div class="price-pct ${up?'green':'red'}">${up?'+':''}${pct}%</div>
      </div>
    </div>
    <canvas id="mainChart" style="width:100%;height:230px;border-radius:10px;border:1px solid #1a1a30"></canvas>
    <div class="tf-row">
      <button class="tf-btn${tf==='1D'?' active':''}" onclick="setTf('1D')">1D</button>
      <button class="tf-btn${tf==='5D'?' active':''}" onclick="setTf('5D')">5D</button>
      <button class="tf-btn${tf==='ALL'?' active':''}" onclick="setTf('ALL')">ALL</button>
      <span style="margin-left:auto;font-size:10px;color:#555">Vol ${(last.v/1e6).toFixed(1)}M</span>
    </div>
    <div class="ohlc">
      ${['O','H','L','C'].map((lb,i)=>`<div class="ohlc-cell"><div class="ohlc-l">${lb}</div><div class="ohlc-v">$${[last.o,last.h,last.l,last.c][i]?.toFixed(2)||'—'}</div></div>`).join('')}
    </div>
    <div class="order-panel">
      <div class="side-toggle">
        <button class="side-btn buy${side==='buy'?' active':''}" onclick="setSide('buy')">BUY</button>
        <button class="side-btn sell${side==='sell'?' active':''}" onclick="setSide('sell')">SELL</button>
      </div>
      <input id="qtyInput" class="qty-input" type="number" min="0.01" step="0.01" value="1" placeholder="Number of shares" oninput="updateEst(this.value)"/>
      <div class="cost-row"><span>Est. ${side==='buy'?'Cost':'Proceeds'}</span><span class="cost-val" id="estCost">$${(1*last.c).toFixed(2)}</span></div>
      <div class="cost-row"><span>Cash Available</span><span class="cost-val">$${fmt(bal)}</span></div>
      ${pos?`<div class="cost-row"><span>Shares Owned</span><span class="cost-val">${pos.shares}</span></div>`:''}
      <button class="exec-btn" id="execBtn" style="background:${side==='buy'?'linear-gradient(135deg,#26a69a,#00897b)':'linear-gradient(135deg,#ef5350,#c62828)'}" onclick="placeOrder()">
        ${side==='buy'?`Buy shares · ${sel}`:`Sell shares · ${sel}`}
      </button>
    </div>
  `;
  setTimeout(drawChart,10);
}

function updateEst(v){
  const last=stockData[sel].candles.at(-1);
  const q=parseFloat(v)||0;
  const el=document.getElementById('estCost');
  if(el)el.textContent='$'+(q*last.c).toFixed(2);
}

function setTf(t){tf=t;renderChart();setTimeout(drawChart,10);}
function setSide(s){side=s;renderChart();}

function placeOrder(){
  const qEl=document.getElementById('qtyInput');
  const q=parseFloat(qEl?.value)||0;
  if(q<=0)return;
  const last=stockData[sel].candles.at(-1);
  const est=+(q*last.c).toFixed(2);
  if(side==='buy'){
    if(est>bal){alert('Insufficient funds!');return;}
    bal=+(bal-est).toFixed(2);
    const ex=port[sel]||{shares:0,avg:0};
    const ns=+(ex.shares+q).toFixed(4);
    port[sel]={shares:ns,avg:+((ex.shares*ex.avg+est)/ns).toFixed(2)};
  } else {
    if(!port[sel]||port[sel].shares<q){alert('Not enough shares!');return;}
    bal=+(bal+est).toFixed(2);
    const ns=+(port[sel].shares-q).toFixed(4);
    if(ns<=0)delete port[sel];
    else port[sel]={...port[sel],shares:ns};
  }
  txs.unshift({time:new Date().toLocaleTimeString(),sym:sel,side,shares:q,price:last.c,total:est});
  if(txs.length>100)txs.pop();
  renderAll();
}

function renderPort(){
  const portVal=Object.entries(port).reduce((s,[sym,p])=>s+p.shares*stockData[sym].candles.at(-1).c,0);
  const total=+(bal+portVal).toFixed(2),pnl=+(total-SB).toFixed(2);
  const pos=Object.entries(port);
  document.getElementById('content').innerHTML=`
    <div class="surf">
      <div style="font-size:11px;color:#555;font-weight:700;margin-bottom:10px;letter-spacing:.5px">ACCOUNT SUMMARY</div>
      ${[['Starting Balance','$'+SB.toLocaleString()],['Cash','$'+fmt(bal)],['Holdings','$'+portVal.toFixed(2)],['Total Value','$'+fmt(total)]].map(([l,v],i)=>`
        <div class="sum-row${i===3?' big':''}"><span style="color:${i===3?'#e0e0f0':'#555'}">${l}</span><span>${v}</span></div>`).join('')}
      <div class="pnl-badge" style="background:${pnl>=0?'#0a2010':'#200a0a'};color:${pnl>=0?'#26a69a':'#ef5350'}">
        P&L: ${pnl>=0?'+':''}${pnl.toFixed(2)} (${((pnl/SB)*100).toFixed(2)}%)
      </div>
    </div>
    ${pos.length===0?'<div class="empty">No open positions yet.<br/>🚀 Start trading!</div>'
    :pos.map(([sym,p])=>{
      const cp=stockData[sym].candles.at(-1).c;
      const pp=+((cp-p.avg)*p.shares).toFixed(2),pu=pp>=0;
      return`<div class="pos-card" onclick="selectStock('${sym}');showTab('chart')">
        <div class="pos-head">
          <div><span class="pos-sym">${sym}</span> <span class="pos-shares">×${p.shares}</span></div>
          <div><div class="pos-val">$${(cp*p.shares).toFixed(2)}</div>
          <div class="pos-pnl ${pu?'green':'red'}">${pu?'+':''}${pp} (${(((cp-p.avg)/p.avg)*100).toFixed(2)}%)</div></div>
        </div>
        <div class="pos-sub">Avg $${p.avg} · Now $${cp.toFixed(2)}</div>
      </div>`;
    }).join('')}
  `;
}

function renderHist(){
  document.getElementById('content').innerHTML=`
    <div style="padding:12px 0;font-size:12px;color:#555">${txs.length} trades executed</div>
    ${txs.length===0?'<div class="empty">No trades yet.</div>'
    :txs.map((tx,i)=>`
      <div class="tx-item" onclick="selectStock('${tx.sym}');showTab('chart')">
        <div><div class="tx-sym">${tx.sym}</div><div class="tx-time">${tx.time}</div></div>
        <div style="text-align:center"><div class="tx-side ${tx.side==='buy'?'green':'red'}">${tx.side}</div><div class="tx-sh">${tx.shares} sh</div></div>
        <div><div class="tx-total">$${tx.total.toFixed(2)}</div><div class="tx-price">@ $${tx.price.toFixed(2)}</div></div>
      </div>`).join('')}
  `;
}

renderAll();
</script>
